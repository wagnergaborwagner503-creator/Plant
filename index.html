                    <div className="due-row" key={p.id + date}>
                      <PlantThumb plant={p} size={46} radius={13} />
                      <div style={{ flex: 1, minWidth: 0, cursor: 'pointer' }} onClick={() => openPlant(p.id)}>
                        <div style={{ fontWeight: 700, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{p.name}</div>
                        <div className="muted" style={{ fontSize: 12.5 }}><b style={{ color: dd <= 0 ? 'var(--due)' : 'var(--soon)' }}>{relDay(date)}</b> · {short.toLowerCase()}</div>
                      </div>
                      <button className="btn btn-soft btn-sm" style={{ flexShrink: 0 }} onClick={() => { addEvent({ plantId: p.id, type: 'move', note: short }); toast(`${p.name} ${ET.move.verb}`, ET.move.emoji); }}><Icon name="check" size={15} />Kész</button>
                    </div>
                  ))}
                </div>
              )}
              {pollSoon.length > 0 && (
                <div style={{ marginTop: 22 }}>
                  <div className="sec-title" style={{ marginBottom: 12 }}>🖌️ Kézi beporzás</div>
                  {pollSoon.map(({ p }) => (
                    <div className="due-row" key={p.id}>
                      <PlantThumb plant={p} size={46} radius={13} />
                      <div style={{ flex: 1, minWidth: 0, cursor: 'pointer' }} onClick={() => openPlant(p.id)}>
                        <div style={{ fontWeight: 700, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{p.name}</div>
                        <div className="muted" style={{ fontSize: 12.5 }}>virágzik – ma porozd be kézzel</div>
                      </div>
                      <button className="btn btn-soft btn-sm" style={{ flexShrink: 0 }} onClick={() => { addEvent({ plantId: p.id, type: 'pollinate' }); toast(`${p.name} ${ET.pollinate.verb}`, ET.pollinate.emoji); }}><Icon name="check" size={15} />Kész</button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div>
              <div className="between" style={{ marginBottom: 12 }}>
                <div className="sec-title">Legutóbbi gondozások</div>
                <button className="btn-ghost btn btn-sm" onClick={() => go('plants')} style={{ padding: '6px 12px' }}>Növények</button>
              </div>
              <div className="card card-pad">
                {recent.length === 0 ? <div className="muted" style={{ textAlign: 'center', padding: 14, fontSize: 13.5 }}>Még nincs naplózott gondozás.</div> : recent.map(e => {
                  const p = plants.find(x => x.id === e.plantId); const t = ET[e.type];
                  return (
                    <div className="tl-item" key={e.id} style={{ cursor: p ? 'pointer' : 'default', padding: '8px 4px' }} onClick={() => p && openPlant(p.id)}>
                      <div className="tl-ic" style={{ background: tint(t.color, .14) }}>{t.emoji}</div>
                      <div className="tl-main">
                        <div className="tl-type" style={{ fontSize: 13.5 }}>{t.label} · <span className="muted" style={{ fontWeight: 600 }}>{p ? p.name : '—'}</span></div>
                        <div className="tl-note" style={{ marginTop: 0 }}>{relDay(e.date)}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
              <button className="btn btn-ghost btn-block" style={{ marginTop: 12 }} onClick={quickLog}><Icon name="plus" size={17} />Gondozás rögzítése</button>
            </div>
          </div>
        </div>
      );
    }

    function Stat({ ic, color, val, lbl }) {
      return (
        <div className="stat">
          <div className="stat-ic" style={{ background: tint(color, .14), color }}><Icon name={ic} size={19} /></div>
          <div className="stat-val" style={{ animation: 'countpop .4s ease' }}>{val}</div>
          <div className="stat-lbl">{lbl}</div>
        </div>
      );
    }

    function FirstRun({ go }) {
      const { addPlant, addEvent, toast } = useStore();
      const seedDemo = () => {
        // _ev: [típus, hány napja] — változatos állapotok bemutatása (lemaradt / ma / hamarosan / rendben)
        const demo = [
          { name: 'Monstera', species: 'Monstera deliciosa', location: 'Nappali', light: 'bright', waterIntervalDays: 7, fertilizeIntervalDays: 30, potSize: '24 cm', soil: 'Univerzális + perlit', _ev: [['water', 9], ['water', 16], ['fertilize', 18], ['repot', 40]] },
          { name: 'Szanszeviéria', species: 'Sansevieria trifasciata', location: 'Háló', light: 'low', waterIntervalDays: 14, fertilizeIntervalDays: 45, potSize: '18 cm', _ev: [['water', 12], ['water', 26]] },
          { name: 'Pozsgás', species: 'Echeveria', location: 'Ablakpárkány', light: 'direct', waterIntervalDays: 10, fertilizeIntervalDays: 60, potSize: '10 cm', _ev: [['water', 6], ['water', 16], ['fertilize', 25], ['prune', 30]] },
          { name: 'Békalevél', species: 'Pilea peperomioides', location: 'Dolgozó', light: 'medium', waterIntervalDays: 5, fertilizeIntervalDays: 30, potSize: '14 cm', _ev: [['water', 5], ['water', 10], ['mist', 3]] },
        ];
        demo.forEach(d => {
          const { _ev, ...rest } = d;
          const p = addPlant(rest);
          _ev.forEach(([type, ago]) => addEvent({ plantId: p.id, type, date: addDaysISO(todayISO(), -ago) }));
        });
        toast('Példa növények betöltve', '🌿');
      };
      return (
        <div className="anim-page empty" style={{ paddingTop: 30 }}>
          <SproutIll className="empty-ill" />
          <div className="empty-title" style={{ fontSize: 22 }}>Üdv a Palántában! 🌱</div>
          <div className="empty-text">Vezesd a növényeid gondozását: öntözés, tápoldat, átültetés és sok más — mind a saját eszközödön tárolva.</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, maxWidth: 280, margin: '0 auto' }}>
            <button className="btn btn-primary btn-block" onClick={() => go('add')}><Icon name="plus" size={18} />Első növény hozzáadása</button>
            <button className="btn btn-ghost btn-block" onClick={seedDemo}><Icon name="sparkles" size={17} />Példa növényekkel kipróbálom</button>
          </div>
        </div>
      );
    }

    /* ============================ NÖVÉNYEK ============================ */
    function PlantsList({ openPlant, quickLog }) {
      const { data, addEvent, toast, weatherVersion } = useStore();
      const { plants, events } = data;
      const [q, setQ] = useState('');
      const [sort, setSort] = useState('urgency');
      const [filter, setFilter] = useState('all');

      const list = useMemo(() => {
        let arr = plants.map(p => ({ p, w: waterInfo(p, events), f: fertInfo(p, events) }));
        if (q.trim()) { const s = stripDia(q); arr = arr.filter(x => stripDia(x.p.name).includes(s) || stripDia(x.p.species).includes(s) || stripDia(x.p.location).includes(s)); }
        if (filter === 'due') arr = arr.filter(x => x.w.state === 'overdue' || x.w.state === 'due');
        if (filter === 'fav') arr = arr.filter(x => x.p.favorite);
        if (sort === 'urgency') arr.sort((a, b) => urgencyKey(a.w) - urgencyKey(b.w));
        if (sort === 'name') arr.sort((a, b) => a.p.name.localeCompare(b.p.name, 'hu'));
        if (sort === 'recent') arr.sort((a, b) => (b.p.createdAt || '').localeCompare(a.p.createdAt || ''));
        return arr;
      }, [plants, events, q, sort, filter, weatherVersion]);

      if (plants.length === 0) return <FirstRun go={() => quickLog()} />;

      return (
        <div className="anim-page">
          <div className="between" style={{ marginBottom: 16 }}>
            <h1 className="h1">Növényeim <span className="muted-3" style={{ fontSize: 18, fontWeight: 700 }}>{plants.length}</span></h1>
          </div>

          <div className="row" style={{ marginBottom: 12, position: 'relative' }}>
            <Icon name="search" size={18} className="muted-3" style={{ position: 'absolute', left: 14 }} />
            <input className="input" placeholder="Keresés név, faj, hely…" value={q} onChange={e => setQ(e.target.value)} style={{ paddingLeft: 42 }} />
          </div>

          <div className="between wrap" style={{ marginBottom: 16, gap: 8 }}>
            <div className="seg">
              {[['all', 'Mind'], ['due', 'Esedékes'], ['fav', 'Kedvenc']].map(([k, l]) => (
                <button key={k} className={cls(filter === k && 'on')} onClick={() => setFilter(k)}>{l}</button>
              ))}
            </div>
            <select className="select" value={sort} onChange={e => setSort(e.target.value)} style={{ width: 'auto', padding: '8px 36px 8px 14px', fontSize: 13, fontWeight: 700, borderRadius: 99 }}>
              <option value="urgency">Sürgősség</option>
              <option value="name">Név szerint</option>
              <option value="recent">Legújabb</option>
            </select>
          </div>

          {list.length === 0 ? (
            <div className="empty"><div style={{ fontSize: 34, marginBottom: 8 }}>🔍</div><div className="empty-text">Nincs találat.</div></div>
          ) : (
            <div className="plant-grid stagger">
              {list.map(({ p, w, f }, i) => (
                <PlantCard key={p.id} plant={p} w={w} f={f} idx={i} onOpen={() => openPlant(p.id)}
                  onWater={() => { addEvent({ plantId: p.id, type: 'water' }); toast(`${p.name} megöntözve`, '💧'); }}
                  onMore={() => openPlant(p.id)} />
              ))}
            </div>
          )}
        </div>
      );
    }

    function countLabel(info) {
      if (!info || info.state === 'none') return '–';
      if (info.state === 'overdue') return '!';
      if (info.daysUntil === 0) return 'ma';
      return String(info.daysUntil);
    }

    function PlantCard({ plant, w, f, idx, onOpen, onWater, onMore }) {
      const wc = STATE_META[w.state].color;
      const fc = STATE_META[(f && f.state) || 'none'].color;
      const sp = spOf(plant);
      const common = sp ? sp.n : (plant.species || '');   // magyar köznapi fajtanév (pl. Eper, Alma, Ananász) – nem a latin
      const rInfo = rootingInfo(plant);
      return (
        <div className="pcard" style={{ animationDelay: (idx * 0.04) + 's' }}>
          <div className="pcard-photo" onClick={onOpen}>
            {plant.photo ? <img src={plant.photo} alt={plant.name} /> : <div className="leaf-ph"><Icon name="leaf" size={46} /></div>}
            <div className="pcard-badge left" style={{ color: wc }} title="Öntözésig hátralévő napok"><Icon name="drop" size={12} />{countLabel(w)}</div>
            {f && f.state !== 'none' && <div className="pcard-badge right" style={{ color: fc }} title="Tápoldatig hátralévő napok"><span style={{ fontSize: 12 }}>🌿</span>{countLabel(f)}</div>}
          </div>
          <div className="pcard-body">
            <div onClick={onOpen}>
              <div className="pcard-name">{plant.favorite && <span style={{ color: 'var(--soon)' }}>★ </span>}{plant.name}</div>
              {common && common !== plant.name && <div className="pcard-species">{common}</div>}
            </div>
            <div className="pcard-meta">
              {rInfo
                ? <React.Fragment><span style={{ fontSize: 13 }}>🫙</span>{rInfo.done ? 'Kigyökerezett – kiültethető' : `Gyökereztetés: ${rInfo.left} nap`}</React.Fragment>
                : <React.Fragment><Icon name="drop" size={13} style={{ color: 'var(--water)' }} />Utoljára: {relPast(w.last)}</React.Fragment>}
            </div>
            <div className="pcard-actions">
              <button className="pcard-water" onClick={onWater}><Icon name="drop" size={15} />Öntözés</button>
              <button className="pcard-more" onClick={onMore} aria-label="Részletek"><Icon name="dots" size={18} /></button>
            </div>
          </div>
        </div>
      );
    }

    /* ============================ NÖVÉNY RÉSZLETEK ============================ */
    function PlantDetail({ plantId, back, edit, editEvent, logFor, repot }) {
      const { data, addEvent, deleteEvent, toggleFav, updatePlant, toast, weatherVersion } = useStore();
      const plant = data.plants.find(p => p.id === plantId);
      const events = useMemo(() => data.events.filter(e => e.plantId === plantId).sort((a, b) => (b.date + b.createdAt).localeCompare(a.date + a.createdAt)), [data.events, plantId]);
      if (!plant) { back(); return null; }

      const sp = plant.speciesKey ? SP_BY_KEY[plant.speciesKey] : null;
      const common = sp ? sp.n : (plant.species || '');
      const w = waterInfo(plant, data.events);
      const f = fertInfo(plant, data.events);
      const nextMove = nextMoveWithin(plant, data.events, -14, 30);
      const pollNow = pollinateActive(plant, data.events);
      const isOutdoor = (plant.placement || 'indoor') === 'outdoor';
      const rootInfo = rootingInfo(plant);
      const wfactor = weatherFactorFor(plant);
      const effWaterInterval = plant.waterIntervalDays ? Math.max(1, Math.round(plant.waterIntervalDays * waterMult(plant, seasonNow()) * wfactor)) : null;
      const potMates = (plant.pot && plant.pot.potId) ? data.plants.filter(p => p.id !== plantId && p.pot && p.pot.potId === plant.pot.potId) : [];
      const waterEvents = data.events.filter(e => e.plantId === plantId && e.type === 'water').map(e => e.date).sort();
      const gaps = waterEvents.slice(1).map((d, i) => daysBetween(waterEvents[i], d));
      const avgGap = gaps.length ? Math.round(gaps.reduce((a, b) => a + b, 0) / gaps.length) : null;

      const grouped = useMemo(() => {
        const m = {};
        events.forEach(e => { (m[e.date] = m[e.date] || []).push(e); });
        return Object.entries(m).sort((a, b) => b[0].localeCompare(a[0]));
      }, [events]);

      const log = (type) => { addEvent({ plantId, type }); toast(`${plant.name} ${ET[type].verb}`, ET[type].emoji); };

      const gapChart = {
        labels: waterEvents.slice(1).map(d => fmtDate(d).replace(/\.$/, '')),
        datasets: [{ data: gaps, backgroundColor: tint('#2b9fe6', .8), borderRadius: 6, barThickness: 16 }],
      };

      return (
        <div className="anim-page">
          <div className="row" style={{ marginBottom: 16 }}>
            <button className="iconbtn" onClick={back} aria-label="Vissza"><Icon name="arrowL" size={20} /></button>
            <div className="topbar-spacer" />
            <button className="iconbtn" onClick={() => toggleFav(plant.id)} style={{ color: plant.favorite ? 'var(--soon)' : undefined }} aria-label="Kedvenc">
              <Icon name="heart" size={19} style={{ fill: plant.favorite ? 'currentColor' : 'none' }} />
            </button>
            <button className="iconbtn" onClick={() => edit(plant.id)} aria-label="Szerkesztés"><Icon name="pencil" size={18} /></button>
          </div>

          <div className="hero" style={{ marginBottom: 18 }}>
            <div className="hero-photo">{plant.photo ? <img src={plant.photo} alt={plant.name} /> : <Icon name="leaf" size={42} />}</div>
            <div style={{ flex: 1, minWidth: 0, paddingTop: 4 }}>
              <h1 className="h1" style={{ fontSize: 24 }}>{plant.name}</h1>
              {common && common !== plant.name && <div className="muted" style={{ fontSize: 14.5, fontWeight: 600, marginTop: 1 }}>{common}</div>}
              <div className="row wrap" style={{ gap: 6, marginTop: 10 }}>
                <span className="info-chip">{(plant.placement || 'indoor') === 'outdoor' ? '🌳 Kint' : '🏠 Bent'}</span>
                {plant.location && <span className="info-chip"><Icon name="pin" size={13} />{plant.location}</span>}
                {(isOutdoor && plant.city) && <span className="info-chip">📍 {plant.city}{w.weather && w.weather.temp != null ? ' · ' + Math.round(w.weather.temp) + '°C' : ''}</span>}
                {plant.light && <span className="info-chip">{LIGHT[plant.light].emoji} {LIGHT[plant.light].label.split(',')[0].split(' / ')[0]}</span>}
                {(potLabel(plant.pot) || plant.potSize) && <span className="info-chip">🪴 {potLabel(plant.pot) || plant.potSize}</span>}
                {potMates.length > 0 && <span className="info-chip">👯 Közös cserép: {potMates.map(p => p.name).join(', ')}</span>}
              </div>
            </div>
          </div>

          <div className="row" style={{ gap: 11, marginBottom: 18 }}>
            <div className="next-card">
              <div className="row" style={{ gap: 7, marginBottom: 6 }}><span style={{ fontSize: 16 }}>💧</span><span className="sec-title">Öntözés</span></div>
              <div style={{ fontWeight: 800, fontFamily: 'var(--display)', fontSize: 17, color: STATE_META[w.state].color }}>{waterPillText(w)}</div>
              <div className="muted-3" style={{ fontSize: 12, marginTop: 3 }}>{plant.waterIntervalDays ? `kb. ${effWaterInterval} naponta · ${SEASON_HU[seasonNow()]}${(isOutdoor && wfactor < 0.92) ? ' · időjárás: sűrűbben' : (isOutdoor && wfactor > 1.1) ? ' · időjárás: ritkábban' : ''}` : 'nincs ütemezve'}</div>
            </div>
            <div className="next-card">
              <div className="row" style={{ gap: 7, marginBottom: 6 }}><span style={{ fontSize: 16 }}>🌿</span><span className="sec-title">Tápoldat</span></div>
              <div style={{ fontWeight: 800, fontFamily: 'var(--display)', fontSize: 17, color: STATE_META[f.state].color }}>{f.state === 'none' ? 'Nincs ütemezve' : waterPillText(f)}</div>
              <div className="muted-3" style={{ fontSize: 12, marginTop: 3 }}>{plant.fertilizeIntervalDays ? (f.offSeason ? 'Téli pihenő – tavasszal' : `${plant.fertilizeIntervalDays} naponta`) : '—'}</div>
            </div>
          </div>

          {rootInfo && (
            <div className="care-card" style={{ marginBottom: 14, borderColor: rootInfo.done ? 'var(--ok)' : 'var(--water)' }}>
              <div className="row" style={{ gap: 12 }}>
                <span style={{ fontSize: 26, flexShrink: 0 }}>🫙</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 800, fontFamily: 'var(--display)', fontSize: 16, color: rootInfo.done ? 'var(--ok)' : 'var(--water)' }}>{rootInfo.done ? 'Gyökereztetés kész – kiültethető! 🌱' : `Gyökereztetés: még ${rootInfo.left} nap`}</div>
                  <div className="muted-3" style={{ fontSize: 12, marginTop: 2 }}>{rootInfo.weeks} hét vízben · {rootInfo.elapsed}/{rootInfo.total} nap</div>
                  <div className="progress" style={{ marginTop: 8 }}><div style={{ width: rootInfo.pct + '%', background: rootInfo.done ? 'var(--ok)' : 'var(--water)' }} /></div>
                </div>
              </div>
              <button className="btn btn-soft btn-sm" style={{ marginTop: 12 }} onClick={() => { updatePlant(plantId, { rooting: null }); toast(rootInfo.done ? 'Kiültetve – gyökereztetés lezárva' : 'Gyökereztetés leállítva', '🌱'); }}><Icon name="check" size={15} />{rootInfo.done ? 'Kiültettem (földbe)' : 'Kész / leállítom'}</button>
            </div>
          )}
          {isOutdoor && (
            plant.city ? (w.weather ? (
              <div className="care-card" style={{ marginBottom: 14 }}>
                <div className="row" style={{ gap: 12 }}>
                  <span style={{ fontSize: 30, flexShrink: 0 }}>{w.weather.emoji}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div className="row" style={{ gap: 8, alignItems: 'baseline' }}>
                      <div style={{ fontWeight: 800, fontFamily: 'var(--display)', fontSize: 24, lineHeight: 1 }}>{w.weather.temp != null ? Math.round(w.weather.temp) + '°C' : '–'}</div>
                      {w.weather.tmaxToday != null && <div className="muted-3" style={{ fontSize: 12 }}>ma max {Math.round(w.weather.tmaxToday)}°C</div>}
                    </div>
                    <div className="muted-3" style={{ fontSize: 12, marginTop: 2 }}>📍 {w.weather.label || plant.city}</div>
                  </div>
                </div>
                {w.weather.summary && <div style={{ fontSize: 13, lineHeight: 1.45, marginTop: 10 }}>{w.weather.summary}</div>}
              </div>
            ) : (
              <div className="care-card muted-3" style={{ marginBottom: 14, fontSize: 12.5, lineHeight: 1.45 }}>🌦️ Időjárás lekérése a(z) {plant.city} helyszínre… (internetkapcsolat szükséges – frissítsd a lapot, ha nem jelenik meg).</div>
            )) : (
              <button className="care-card" style={{ marginBottom: 14, width: '100%', textAlign: 'left', fontSize: 12.5, lineHeight: 1.5, color: 'var(--text-2)' }} onClick={() => edit(plant.id)}>
                📍 Add meg ennél a kinti növénynél a <b>települést</b>, és az app kiírja a pillanatnyi hőmérsékletet, és az időjárás (hőség, eső) szerint módosítja az öntözési ütemet. <span style={{ color: 'var(--primary)', fontWeight: 700 }}>Beállítom →</span>
              </button>
            )
          )}
          {nextMove && (
            <div className="care-card" style={{ marginBottom: 14, borderColor: 'var(--soon)', display: 'flex', gap: 10, alignItems: 'flex-start' }}>
              <span style={{ fontSize: 18, flexShrink: 0 }}>🚚</span>
              <div style={{ fontSize: 13.5, lineHeight: 1.45, flex: 1 }}>
                <b>{nextMove.short} · {relDay(nextMove.date)}:</b> {nextMove.where}
                <div style={{ marginTop: 8 }}><button className="btn btn-soft btn-sm" onClick={() => { addEvent({ plantId, type: 'move', note: nextMove.short }); toast(`${plant.name} ${ET.move.verb}`, ET.move.emoji); }}><Icon name="check" size={15} />Megcsináltam</button></div>
              </div>
            </div>
          )}
          {pollNow && (
            <div className="care-card" style={{ marginBottom: 14, borderColor: '#db2777', display: 'flex', gap: 10, alignItems: 'flex-start' }}>
              <span style={{ fontSize: 18, flexShrink: 0 }}>🖌️</span>

    /* ============================ NAPTÁR ============================ */
    function CalendarView({ openPlant, openDay }) {
      const { data, weatherVersion } = useStore();
      const today = new Date();
      const [ym, setYm] = useState({ y: today.getFullYear(), m: today.getMonth() });

      const eventsByDate = useMemo(() => {
        const map = {};
        data.events.forEach(e => { (map[e.date] = map[e.date] || []).push(e); });
        return map;
      }, [data.events]);

      const taskByDate = useMemo(() => {
        const map = {};
        const monthPrefix = `${ym.y}-${pad(ym.m + 1)}`;
        const monthStart = `${monthPrefix}-01`;
        const today = todayISO();
        const from = monthStart > today ? monthStart : today;
        data.plants.forEach(p => {
          if (p.waterIntervalDays) {
            const last = lastOfType(data.events, p.id, 'water');
            if (last) {
              const eff = Math.max(1, Math.round(p.waterIntervalDays * waterMult(p, seasonOf(last)) * weatherFactorFor(p)));
              let n = Math.ceil(daysBetween(last, from) / eff); if (n < 1) n = 1;
              let d = addDaysISO(last, n * eff), guard = 0;
              while (d.startsWith(monthPrefix) && guard < 60) { (map[d] = map[d] || new Set()).add('water'); d = addDaysISO(d, eff); guard++; }
            }
          }
          if (p.fertilizeIntervalDays) {
            const fd = fertInfo(p, data.events).due;
            if (fd && fd.startsWith(monthPrefix) && fd >= today) (map[fd] = map[fd] || new Set()).add('fertilize');
          }
        });
        // Költöztetés (áttelelés) + kézi beporzás a hónap jövőbeli napjaira
        const dim = new Date(ym.y, ym.m + 1, 0).getDate();
        for (let dd = 1; dd <= dim; dd++) {
          const iso = `${monthPrefix}-${pad(dd)}`;
          if (iso < today) continue;
          if (moveTasksForDay(data.plants, data.events, iso).length) (map[iso] = map[iso] || new Set()).add('move');
          if (pollinateTasksForDay(data.plants, data.events, iso).length) (map[iso] = map[iso] || new Set()).add('pollinate');
        }
        return map;
      }, [data.plants, data.events, ym, weatherVersion]);

      const first = new Date(ym.y, ym.m, 1);
      const startDow = (first.getDay() + 6) % 7; // hétfő = 0
      const daysInMonth = new Date(ym.y, ym.m + 1, 0).getDate();
      const cells = [];
      for (let i = 0; i < startDow; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(dateToISO(new Date(ym.y, ym.m, d)));

      const monthName = new Intl.DateTimeFormat('hu-HU', { year: 'numeric', month: 'long' }).format(first);
      const move = delta => { let m = ym.m + delta, y = ym.y; if (m < 0) { m = 11; y--; } if (m > 11) { m = 0; y++; } setYm({ y, m }); };

      const monthEvents = data.events.filter(e => e.date.startsWith(`${ym.y}-${pad(ym.m + 1)}`));

      // A cellák magasságát = oszlopszélesség (négyzet), JS-sel mérve — megbízhatóbb, mint az aspect-ratio gridben
      const gridRef = useRef(null);
      const [cellH, setCellH] = useState(44);
      useEffect(() => {
        const g = gridRef.current; if (!g) return;
        const measure = () => { const c = g.querySelector('.cal-cell'); if (c) { const w = c.getBoundingClientRect().width; if (w > 1) setCellH(Math.round(w)); } };
        measure();
        const raf = requestAnimationFrame(measure);
        let ro; if (typeof ResizeObserver !== 'undefined') { ro = new ResizeObserver(measure); ro.observe(g); }
        return () => { cancelAnimationFrame(raf); if (ro) ro.disconnect(); };
      }, []);

      return (
        <div className="anim-page">
          <h1 className="h1" style={{ marginBottom: 16 }}>Naptár</h1>
          <div className="card card-pad" style={{ marginBottom: 18 }}>
            <div className="between" style={{ marginBottom: 16 }}>
              <button className="iconbtn" onClick={() => move(-1)}><Icon name="chevL" size={18} /></button>
              <div style={{ fontFamily: 'var(--display)', fontWeight: 800, fontSize: 17, textTransform: 'capitalize' }}>{monthName}</div>
              <button className="iconbtn" onClick={() => move(1)}><Icon name="chevR" size={18} /></button>
            </div>
            <div className="cal-head">{['H', 'K', 'Sze', 'Cs', 'P', 'Szo', 'V'].map(d => <div className="cal-wd" key={d}>{d}</div>)}</div>
            <div className="cal-grid" ref={gridRef} style={{ gridAutoRows: cellH + 'px' }}>
              {cells.map((iso, i) => {
                if (!iso) return <div className="cal-cell empty" key={'e' + i} />;
                const evs = eventsByDate[iso] || [];
                const evTypes = [...new Set(evs.map(e => e.type))].slice(0, 3);
                const taskTypes = (iso >= todayISO() && taskByDate[iso]) ? [...taskByDate[iso]].slice(0, 2) : [];
                const isToday = iso === todayISO();
                return (
                  <button className={cls('cal-cell', (evs.length || taskTypes.length) && 'has', isToday && 'today')} key={iso} onClick={() => openDay(iso)}>
                    {Number(iso.slice(-2))}
                    <div className="cal-dots">
                      {evTypes.map(t => <span className="cal-dot" key={'e' + t} style={{ background: ET[t].color }} />)}
                      {taskTypes.map(t => <span className="cal-dot" key={'t' + t} style={{ background: 'transparent', border: '1.5px solid ' + ET[t].color }} />)}
                    </div>
                  </button>
                );
              })}
            </div>
          </div>

          <div className="sec-title" style={{ marginBottom: 12 }}>Hónap eseményei <span className="muted-3">({monthEvents.length})</span></div>
          {monthEvents.length === 0 ? (
            <div className="card card-pad muted" style={{ textAlign: 'center', fontSize: 13.5 }}>Ebben a hónapban nincs naplózott esemény.</div>
          ) : (
            <div className="card card-pad">
              {[...monthEvents].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 30).map(e => {
                const p = data.plants.find(x => x.id === e.plantId); const t = ET[e.type];
                return (
                  <div className="tl-item" key={e.id} style={{ cursor: p ? 'pointer' : 'default' }} onClick={() => p && openPlant(p.id)}>
                    <div className="tl-ic" style={{ background: tint(t.color, .14) }}>{t.emoji}</div>
                    <div className="tl-main"><div className="tl-type" style={{ fontSize: 13.5 }}>{t.label} · <span className="muted" style={{ fontWeight: 600 }}>{p ? p.name : '—'}</span></div><div className="tl-note" style={{ marginTop: 0 }}>{fmtDate(e.date)}</div></div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    /* ============================ STATISZTIKA ============================ */
    function StatsView() {
      const { data } = useStore();
      const { plants, events } = data;

      if (events.length === 0 && plants.length === 0) {
        return <div className="anim-page empty"><SproutIll className="empty-ill" /><div className="empty-title">Még nincs adat</div><div className="empty-text">Adj hozzá növényeket és naplózz gondozást, hogy itt megjelenjenek a statisztikák.</div></div>;
      }

      const monthStart = todayISO().slice(0, 8) + '01';
      const monthCount = events.filter(e => e.date >= monthStart).length;

      // sorozat: hány egymást követő nap volt gondozás máig
      const dates = new Set(events.map(e => e.date));
      let streak = 0; let cur = todayISO();
      while (dates.has(cur)) { streak++; cur = addDaysISO(cur, -1); }

      const byType = EVENT_TYPES.map(t => ({ t, n: events.filter(e => e.type === t.key).length })).filter(x => x.n > 0);
      const doughnut = { labels: byType.map(x => x.t.label), datasets: [{ data: byType.map(x => x.n), backgroundColor: byType.map(x => x.t.color), borderWidth: 0, hoverOffset: 6 }] };

      // 12 hét aktivitás
      const weeks = [];
      for (let i = 11; i >= 0; i--) {
        const end = addDaysISO(todayISO(), -i * 7);
        const start = addDaysISO(end, -6);
        weeks.push({ label: fmtDate(start).replace(/\s*\d{4}\.\s*/, '').replace(/\.$/, ''), n: events.filter(e => e.date >= start && e.date <= end).length });
      }
      const weekChart = { labels: weeks.map(w => w.label), datasets: [{ data: weeks.map(w => w.n), backgroundColor: tint('#16a34a', .75), borderRadius: 6, barThickness: 12 }] };

      // növényenkénti gondozás
      const perPlant = plants.map(p => ({ p, n: events.filter(e => e.plantId === p.id).length })).sort((a, b) => b.n - a.n).slice(0, 8);
      const ppChart = { labels: perPlant.map(x => x.p.name), datasets: [{ data: perPlant.map(x => x.n), backgroundColor: tint('#8b5cf6', .8), borderRadius: 6 }] };

      const mostThirsty = plants.map(p => ({ p, c: events.filter(e => e.plantId === p.id && e.type === 'water').length })).sort((a, b) => b.c - a.c)[0];

      return (
        <div className="anim-page">
          <h1 className="h1" style={{ marginBottom: 18 }}>Statisztika</h1>
          <div className="stat-grid stagger" style={{ marginBottom: 20 }}>
            <Stat ic="leaf" color="#16a34a" val={plants.length} lbl="növény" />
            <Stat ic="chart" color="#2b9fe6" val={events.length} lbl="összes bejegyzés" />
            <Stat ic="calendar" color="#8b5cf6" val={monthCount} lbl="ebben a hónapban" />
            <Stat ic="sparkles" color="#f08c00" val={streak} lbl="napos sorozat" />
          </div>

          <div className="two-col">
            <div>
              {byType.length > 0 && (
                <div className="card card-pad" style={{ marginBottom: 16 }}>
                  <div className="sec-title" style={{ marginBottom: 14 }}>Gondozás típusok</div>
                  <ChartBox type="doughnut" data={doughnut} height={210} options={{ cutout: '62%', plugins: { legend: { display: true, position: 'right', labels: { boxWidth: 10, boxHeight: 10, padding: 10, font: { size: 12 }, color: getComputedStyle(document.documentElement).getPropertyValue('--text-2').trim() } } } }} />
                </div>
              )}
            </div>
            <div>
              <div className="card card-pad" style={{ marginBottom: 16 }}>
                <div className="sec-title" style={{ marginBottom: 14 }}>Aktivitás (12 hét)</div>
                <ChartBox type="bar" data={weekChart} height={180} options={{ scales: { x: { ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 6, font: { size: 10 } } }, y: { beginAtZero: true, ticks: { precision: 0 } } } }} />
              </div>
            </div>
          </div>

          {perPlant.length > 0 && (
            <div className="card card-pad" style={{ marginBottom: 16 }}>
              <div className="sec-title" style={{ marginBottom: 14 }}>Legtöbbet gondozott növények</div>
              <ChartBox type="bar" data={ppChart} height={Math.max(150, perPlant.length * 34)}
                options={{ indexAxis: 'y', scales: { x: { beginAtZero: true, ticks: { precision: 0 } }, y: { ticks: { font: { size: 12 } } } } }} />
            </div>
          )}

          {mostThirsty && mostThirsty.c > 0 && (
            <div className="card card-pad row" style={{ gap: 14 }}>
              <div style={{ fontSize: 30 }}>🏆</div>
              <div><div style={{ fontWeight: 700 }}>Legszomjasabb növény</div><div className="muted" style={{ fontSize: 13.5 }}>{mostThirsty.p.name} — {mostThirsty.c} öntözés naplózva</div></div>
            </div>
          )}
        </div>
      );
    }

    /* ============================ BEÁLLÍTÁSOK ============================ */

      const { data, setTheme, setNotif, toggleKit, setSettings, importData, resetData, toast } = useStore();
      const autoBackupOn = !!(data.settings && data.settings.autoBackup);
      const kitPlaces = (data.settings.kit && data.settings.kit.places) || {};
      const kitTools = (data.settings.kit && data.settings.kit.tools) || {};
      const fileRef = useRef(null);
      const [confirmReset, setConfirmReset] = useState(false);
      const [installEvt, setInstallEvt] = useState(window.__deferredInstall || null);
      const [perm, setPerm] = useState(('Notification' in window) ? Notification.permission : 'unsupported');
      const notifEnabled = perm === 'granted' && !!(data.settings.notif && data.settings.notif.enabled);

      const enableNotif = async () => {
        if (!('Notification' in window)) { toast('Nem támogatott böngésző', '⚠️'); return; }
        let p = Notification.permission;
        if (p === 'default') p = await Notification.requestPermission();
        setPerm(p);
        if (p !== 'granted') { toast('Értesítés nem engedélyezve', '🔕'); return; }
        setNotif({ enabled: true });
        await registerPeriodicSync();
        await fireReminders(scheduleFromData(data), todayISO());
        toast('Értesítések bekapcsolva', '🔔');
      };
      const disableNotif = async () => {
        setNotif({ enabled: false });
        try { const reg = await navigator.serviceWorker.ready; if (reg.periodicSync) await reg.periodicSync.unregister('palanta-water-check'); } catch (e) {}
        toast('Értesítések kikapcsolva', '🔕');
      };
      const testNotif = async () => {
        try { const reg = await navigator.serviceWorker.ready; await reg.showNotification('Palánta 🌱', { body: 'Így néz ki egy öntözési emlékeztető. 💧', icon: './icon.svg', badge: './icon.svg' }); toast('Teszt elküldve', '🔔'); }
        catch (e) { toast('Nem sikerült elküldeni', '⚠️'); }
      };

      useEffect(() => {
        const fn = e => { e.preventDefault(); window.__deferredInstall = e; setInstallEvt(e); };
        window.addEventListener('beforeinstallprompt', fn);
        return () => window.removeEventListener('beforeinstallprompt', fn);
      }, []);

      const [persisted, setPersisted] = useState(null);
      useEffect(() => { if (navigator.storage && navigator.storage.persisted) navigator.storage.persisted().then(setPersisted).catch(() => setPersisted(null)); }, []);
      const requestPersist = async () => {
        if (!(navigator.storage && navigator.storage.persist)) { toast('Nem támogatott böngésző', '⚠️'); return; }
        const ok = await navigator.storage.persist(); setPersisted(ok);
        toast(ok ? 'Adatok védve' : 'A böngésző egyelőre nem engedélyezte', ok ? '🔒' : '⚠️');
      };

      const storageKB = useMemo(() => { try { return Math.round(new Blob([JSON.stringify(data)]).size / 1024); } catch (e) { return 0; } }, [data]);

      const exportData = () => {

        a.href = url; a.download = `palanta-mentes-${todayISO()}.json`; a.click();
        URL.revokeObjectURL(url); toast('Mentés letöltve', '💾');

        r.onload = () => { try { const obj = JSON.parse(r.result); if (!obj.plants) throw 0; importData(obj); toast('Adatok visszatöltve', '✅'); } catch (err) { toast('Hibás fájl', '⚠️'); } };
        r.readAsText(file); e.target.value = '';

          <button className="action-item" style={{ marginBottom: 22 }} onClick={openKB}>
            <div className="action-ic" style={{ background: tint('#16a34a', .14), color: '#16a34a' }}>📖</div>
            <div style={{ flex: 1, minWidth: 0 }}><div style={{ fontWeight: 700 }}>Tudástár</div><div className="muted" style={{ fontSize: 13 }}>{PLANT_DB.length} növény gondozási útmutatóval</div></div>
            <Icon name="chevR" size={18} className="muted-3" />
          </button>

                  <Icon name={ic} size={20} style={{ color: data.settings.theme === k ? 'var(--primary)' : 'var(--text-2)' }} />
                  <span style={{ fontSize: 12.5, fontWeight: 700, color: data.settings.theme === k ? 'var(--primary-700)' : 'var(--text-2)' }}>{l}</span>

              ))}

          </button>

          <div className="sec-title" style={{ marginBottom: 11 }}>Értesítések</div>
          <div className="card" style={{ marginBottom: 14 }}>
            <div className="set-row">
              <div className="set-ic" style={{ color: 'var(--water)' }}><Icon name="bell" size={20} /></div>
              <div className="set-main">
                <div className="set-title">Öntözési emlékeztetők</div>
                <div className="set-sub">Egy nappal előtte és aznap is szól</div>
              </div>
              {perm === 'unsupported'

                    : <button className="btn btn-soft btn-sm" onClick={enableNotif}>Bekapcsolás</button>}
            </div>
            {perm === 'granted' && notifEnabled && (
              <div className="set-row">
                <div className="set-ic"><Icon name="sparkles" size={19} className="muted" /></div>
                <div className="set-main"><div className="set-title">Teszt értesítés</div><div className="set-sub">Nézd meg, hogy néz ki</div></div>
                <button className="btn btn-ghost btn-sm" onClick={testNotif}>Küldés</button>
              </div>
            )}
          </div>
          {perm === 'denied'
            ? <div className="muted-3" style={{ fontSize: 12, lineHeight: 1.5, marginBottom: 22, padding: '0 4px' }}>Az értesítések le vannak tiltva ehhez az oldalhoz. Engedélyezd a címsor 🔒 ikonjánál (Webhely beállításai → Értesítések), majd térj vissza ide.</div>
            : <div className="muted-3" style={{ fontSize: 12, lineHeight: 1.5, marginBottom: 22, padding: '0 4px' }}>📱 Androidon, telepített appként a háttérben is emlékeztet (kb. naponta egyszer — a böngésző választja az időpontot). Az appot megnyitva mindig ellenőrzi a mai és holnapi teendőket. iPhone-on csak megnyitáskor szól.</div>}

          <div className="sec-title" style={{ marginBottom: 11 }}>Adatok</div>
          <div className="card" style={{ marginBottom: 14 }}>
            <button className="set-row" style={{ width: '100%', textAlign: 'left' }} onClick={exportData}>
              <div className="set-ic" style={{ color: 'var(--primary)' }}><Icon name="download" size={20} /></div>
              <div className="set-main"><div className="set-title">Mentés exportálása</div><div className="set-sub">Biztonsági mentés JSON-fájlba</div></div>
              <Icon name="chevR" size={18} className="muted-3" />
            </button>
            <button className="set-row" style={{ width: '100%', textAlign: 'left' }} onClick={() => fileRef.current.click()}>
              <div className="set-ic" style={{ color: 'var(--water)' }}><Icon name="upload" size={20} /></div>
              <div className="set-main"><div className="set-title">Visszatöltés</div><div className="set-sub">Korábbi mentés importálása</div></div>
              <Icon name="chevR" size={18} className="muted-3" />
            </button>
            <input ref={fileRef} type="file" accept="application/json,.json" onChange={onImport} style={{ display: 'none' }} />
            <div className="set-row">
              <div className="set-ic"><Icon name="info" size={20} className="muted" /></div>
              <div className="set-main"><div className="set-title">Tárhelyhasználat</div><div className="set-sub">{data.plants.length} növény · {data.events.length} bejegyzés · {storageKB} KB</div></div>
            </div>
            <div className="set-row">
              <div className="set-ic" style={{ color: persisted ? 'var(--ok)' : 'var(--soon)' }}><Icon name={persisted ? 'check' : 'info'} size={20} /></div>
              <div className="set-main"><div className="set-title">Adatok védelme</div><div className="set-sub">{persisted === true ? 'Tartós tárolás bekapcsolva – a böngésző nem törli magától.' : persisted === false ? 'Nincs védve – koppints a bekapcsoláshoz.' : 'Ellenőrzés…'}</div></div>
              {persisted === false && <button className="btn btn-soft btn-sm" onClick={requestPersist}>Bekapcsol</button>}
            </div>
            <div className="set-row">
              <div className="set-ic" style={{ color: 'var(--water)' }}><Icon name="download" size={20} /></div>
              <div className="set-main"><div className="set-title">Automatikus napi mentés</div><div className="set-sub">Naponta egyszer letölt egy JSON mentést a Letöltésekbe – ez a böngésző-ürítést is túléli.</div></div>
              <button className={cls('switch', autoBackupOn && 'on')} onClick={() => { setSettings({ autoBackup: !autoBackupOn }); toast(autoBackupOn ? 'Automatikus mentés ki' : 'Automatikus mentés be', autoBackupOn ? '🔕' : '🛟'); }} aria-label="Automatikus mentés kapcsolása" />
            </div>
          </div>
          <div className="muted-3" style={{ fontSize: 12, lineHeight: 1.5, marginBottom: 22, padding: '0 4px' }}>
            ⚠️ Minden adat kizárólag ezen az eszközön tárolódik (böngésző). Az app törlése vagy a böngészőadatok ürítése törli a naplót — érdemes időnként mentést exportálni.
          </div>

          {installEvt && (
            <React.Fragment>
              <div className="sec-title" style={{ marginBottom: 11 }}>Alkalmazás</div>
              <button className="btn btn-primary btn-block" style={{ marginBottom: 22 }} onClick={doInstall}><Icon name="download" size={18} />Telepítés a kezdőképernyőre</button>
            </React.Fragment>
          )}

          <div className="sec-title" style={{ marginBottom: 11 }}>Veszélyzóna</div>
          <div className="card" style={{ marginBottom: 22 }}>
            {!confirmReset ? (

                <div className="set-ic" style={{ color: 'var(--overdue)' }}><Icon name="trash" size={19} /></div>
                <div className="set-main"><div className="set-title" style={{ color: 'var(--overdue)' }}>Összes adat törlése</div><div className="set-sub">Minden növény és bejegyzés véglegesen törlődik</div></div>
              </button>
            ) : (
              <div className="card-pad">
                <div style={{ fontWeight: 700, marginBottom: 4 }}>Biztosan törlöd az összes adatot?</div>
                <div className="muted" style={{ fontSize: 13, marginBottom: 14 }}>Ez nem vonható vissza. Előtte exportálj mentést!</div>
                <div className="row" style={{ gap: 10 }}>
                  <button className="btn btn-ghost" style={{ flex: 1 }} onClick={() => setConfirmReset(false)}>Mégse</button>
                  <button className="btn btn-danger" style={{ flex: 1 }} onClick={() => { resetData(); setConfirmReset(false); toast('Minden adat törölve', '🗑️'); }}>Törlés</button>
                </div>
              </div>
            )}
          </div>

          <div style={{ textAlign: 'center', color: 'var(--text-3)', fontSize: 12, paddingBottom: 10 }}>
            <div style={{ fontFamily: 'var(--display)', fontWeight: 700, fontSize: 14, color: 'var(--text-2)' }}>Palánta 🌱</div>
            Növénynapló · v1 · helyi tárolás
          </div>
        </div>
      );
    }

    /* ============================ NÖVÉNY ŰRLAP ============================ */
    function PlantForm({ plantId, close }) {
      const { data, addPlant, updatePlant, deletePlant, consumeInv, toast } = useStore();
      const editing = data.plants.find(p => p.id === plantId);
      const [form, setForm] = useState(() => editing
        ? { soilUsedL: '', potInvId: null, soilInvId: null, planterInvId: null, trayInvId: null, deductInv: false, soilTouched: true, potMode: 'own', sharePlantId: '', rootMode: !!(editing && editing.rooting), rootWeeks: (editing && editing.rooting && editing.rooting.weeks) || '', potQty: (editing.pot && editing.pot.qty) || 1, city: editing.city || '', potShape: (editing.pot && editing.pot.shape) || 'round', potDia: (editing.pot && editing.pot.dia) || '', potLen: (editing.pot && editing.pot.len) || '', potWid: (editing.pot && editing.pot.wid) || '', potHt: (editing.pot && editing.pot.ht) || '', ...editing }
        : { name: '', species: '', speciesKey: null, location: '', placement: 'indoor', city: '', light: 'bright', potSize: '', potShape: 'round', potDia: '', potLen: '', potWid: '', potHt: '', potQty: 1, potInvId: null, soil: '', soilUsedL: '', soilTouched: false, soilInvId: null, planter: '', planterInvId: null, tray: '', trayInvId: null, deductInv: true, potMode: 'own', sharePlantId: '', rootMode: false, rootWeeks: '', photo: null, waterIntervalDays: 7, fertilizeIntervalDays: 30, notes: '' });
      const inv = data.inventory || [];
      const invPots = inv.filter(i => i.cat === 'pot');
      const invSoils = inv.filter(i => i.cat === 'soil');
      const invPlanters = inv.filter(i => i.cat === 'planter');
      const invTrays = inv.filter(i => i.cat === 'tray');
      const otherPlants = (data.plants || []).filter(p => p.id !== plantId && p.pot && (p.pot.dia || p.pot.len || p.pot.wid));
      // Cserépméret változásakor automatikusan kitölti a becsült földmennyiséget (amíg a user kézzel nem írta felül)
      const setPotField = (patch) => setForm(f => {
        const nf = { ...f, ...patch };
        if (!nf.soilTouched) { const est = estimateSoilL({ shape: nf.potShape, dia: nf.potDia, len: nf.potLen, wid: nf.potWid, ht: nf.potHt }); if (est != null) nf.soilUsedL = est; }
        return nf;
      });
      const [busy, setBusy] = useState(false);
      const [confirmDel, setConfirmDel] = useState(false);
      const [spQuery, setSpQuery] = useState('');
      const [spOpen, setSpOpen] = useState(false);
      const fileRef = useRef(null);
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const selectedSp = form.speciesKey ? SP_BY_KEY[form.speciesKey] : null;
      const spResults = useMemo(() => {
        const q = stripDia(spQuery.trim());
        let arr = PLANT_DB;
        if (q) arr = arr.filter(s => stripDia(s.n).includes(q) || stripDia(s.lat).includes(q) || stripDia(PLANT_CATS[s.c].label).includes(q));
        return arr.slice(0, 50);
      }, [spQuery]);
      const pickSpecies = (s) => {
        setForm(f => ({ ...f, speciesKey: s.k, species: s.lat, name: (f.name && f.name.trim()) ? f.name : s.n, light: s.light, waterIntervalDays: s.w, fertilizeIntervalDays: s.f }));
        setSpOpen(false); setSpQuery('');
      };
      const clearSpecies = () => { set('speciesKey', null); setSpOpen(false); };

      const onPhoto = async e => {
        const file = e.target.files[0]; if (!file) return;
        setBusy(true);
        try { set('photo', await resizeImage(file)); } catch (err) { toast('Kép betöltése sikertelen', '⚠️'); }
        setBusy(false); e.target.value = '';
      };

      const save = () => {
        if (!form.name.trim()) { toast('Adj nevet a növénynek', '🌱'); return; }
        let pot = null, deduct = form.deductInv, soilL = form.soilUsedL ? Number(form.soilUsedL) : null;
        if (!editing && form.potMode === 'share' && form.sharePlantId) {
          // Közös cserép: a társ növény cserepét örököljük (azonos potId), nincs leltár-levonás
          const src = (data.plants || []).find(p => p.id === form.sharePlantId);
          if (src && src.pot) {
            const srcPot = { ...src.pot };
            if (!srcPot.potId) { srcPot.potId = uid(); updatePlant(src.id, { pot: srcPot }); }
            pot = { ...srcPot }; deduct = false; soilL = null;
          }
        }
        if (!pot) {
          const hasDims = form.potShape === 'square' ? (form.potLen || form.potWid) : form.potDia;
          pot = (hasDims || form.potHt)
            ? { shape: form.potShape || 'round', dia: (form.potShape !== 'square' && form.potDia) ? Number(form.potDia) : '', len: (form.potShape === 'square' && form.potLen) ? Number(form.potLen) : '', wid: (form.potShape === 'square' && form.potWid) ? Number(form.potWid) : '', ht: form.potHt ? Number(form.potHt) : '', qty: Math.max(1, Number(form.potQty) || 1), invId: form.potInvId || null, potId: (editing && editing.pot && editing.pot.potId) || uid() }
            : ((editing && editing.pot) || null);
        }
        const rooting = form.rootMode ? { start: (editing && editing.rooting && editing.rooting.start) || todayISO(), weeks: Math.max(1, Number(form.rootWeeks) || (selectedSp && selectedSp.rootWeeks) || 3) } : null;
        const payload = { ...form, pot, potSize: potLabel(pot) || form.potSize || '', soilUsedL: soilL, rooting };
        ['potShape', 'potDia', 'potLen', 'potWid', 'potHt', 'potQty', 'potInvId', 'soilInvId', 'planterInvId', 'trayInvId', 'deductInv', 'soilTouched', 'potMode', 'sharePlantId', 'rootMode', 'rootWeeks'].forEach(k => delete payload[k]);
        if (editing) { updatePlant(editing.id, payload); toast('Mentve', '✅'); }
        else {
          addPlant(payload);
          if (deduct && (form.potInvId || form.planterInvId || form.trayInvId || (form.soilInvId && soilL))) {
            consumeInv({ potInvId: form.potInvId, potCount: Number(form.potQty) || 1, planterInvId: form.planterInvId, trayInvId: form.trayInvId, soilInvId: form.soilInvId, soilL });
          }
          toast('Növény hozzáadva', '🌿');
        }
        close();
      };

      return (
        <Sheet title={editing ? 'Növény szerkesztése' : 'Új növény'} onClose={close}
          foot={<React.Fragment>
            <button className="btn btn-ghost" style={{ flex: 1 }} onClick={close}>Mégse</button>
            <button className="btn btn-primary" style={{ flex: 2 }} onClick={save}><Icon name="check" size={18} />{editing ? 'Mentés' : 'Hozzáadás'}</button>
          </React.Fragment>}>

          <div className="field">
            <label>Növény típusa <span className="muted-3" style={{ fontWeight: 600 }}>· a gondozáshoz</span></label>
            {selectedSp ? (
              <div className="sp-selected">
                <span className="sp-emoji">{PLANT_CATS[selectedSp.c].emoji}</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 700 }}>{selectedSp.n}</div>
                  <div className="muted-3" style={{ fontSize: 12.5, fontStyle: 'italic' }}>{selectedSp.lat}</div>
                </div>
                <button className="btn btn-ghost btn-sm" onClick={clearSpecies}>Csere</button>
              </div>
            ) : (
              <React.Fragment>
                <input className="input" placeholder="Keress: pl. Monstera, kaktusz, bazsalikom…" value={spQuery}
                  onChange={e => { setSpQuery(e.target.value); setSpOpen(true); }} onFocus={() => setSpOpen(true)} />
                {spOpen && (
                  <div className="sp-list">
                    {spResults.map(s => (
                      <button key={s.k} className="sp-row" onClick={() => pickSpecies(s)}>
                        <span className="sp-emoji">{PLANT_CATS[s.c].emoji}</span>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontWeight: 700, fontSize: 14 }}>{s.n}</div>
                          <div className="muted-3" style={{ fontSize: 12, fontStyle: 'italic', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.lat}</div>
                        </div>
                        <span className="muted-3" style={{ fontSize: 11, fontWeight: 700, flexShrink: 0 }}>{PLANT_CATS[s.c].label}</span>
                      </button>
                    ))}
                    <button className="sp-row" style={{ justifyContent: 'center', color: 'var(--text-3)', fontWeight: 700 }} onClick={() => setSpOpen(false)}>Egyéni növény (kihagyom) ✕</button>
                  </div>
                )}
              </React.Fragment>
            )}
          </div>
          {selectedSp && (
            <div className="care-card" style={{ marginBottom: 16 }}>
              <div className="field-label" style={{ marginBottom: 10 }}>🌱 Ajánlott gondozás{hasAnyKit(data.settings.kit) ? ' (a felszerelésedre szabva)' : ''}</div>
              {careAdvice(selectedSp, data.settings.kit, form.placement).slice(0, 8).map((tip, i) => (
                <div className="tip" key={i}><span className="te">{tip.e}</span><span>{tip.t}</span></div>
              ))}
            </div>
          )}

          <div className="field">
            <button type="button" className="kit-chip" style={{ width: '100%', justifyContent: 'space-between' }} onClick={() => setForm(f => { const on = !f.rootMode; return { ...f, rootMode: on, rootWeeks: on ? (f.rootWeeks || (selectedSp && selectedSp.rootWeeks) || 3) : f.rootWeeks }; })}>
              <span>🫙 Gyökereztetés vízben (dugvány)</span>
              <span className={cls('switch', form.rootMode && 'on')} style={{ pointerEvents: 'none' }} />
            </button>
            {form.rootMode && (
              <div style={{ marginTop: 10 }}>
                <div className="field-label" style={{ marginBottom: 7 }}>Hány hétig gyökerezzen?{selectedSp && selectedSp.rootWeeks ? ` · ajánlott: ${selectedSp.rootWeeks} hét` : ''}</div>
                <div className="stepper">
                  <button type="button" onClick={() => set('rootWeeks', Math.max(1, (Number(form.rootWeeks) || 1) - 1))}>−</button>
                  <input className="val" style={{ border: 'none', background: 'transparent', width: 60, textAlign: 'center' }} type="number" inputMode="numeric" value={form.rootWeeks} onChange={e => set('rootWeeks', e.target.value)} />
                  <button type="button" onClick={() => set('rootWeeks', (Number(form.rootWeeks) || 1) + 1)}>+</button>
                </div>
                <div className="muted-3" style={{ fontSize: 11.5, lineHeight: 1.5, marginTop: 7 }}>≈ {(Number(form.rootWeeks) || 0) * 7} nap a vízben. A növény oldalán látod majd, hány nap van hátra a gyökereztetésből.</div>
              </div>
            )}
          </div>

          <div className="photo-pick" onClick={() => fileRef.current.click()}>
            {form.photo ? <React.Fragment>
              <img src={form.photo} alt="" />
              <span className="photo-clear" onClick={e => { e.stopPropagation(); set('photo', null); }}><Icon name="x" size={16} /></span>
            </React.Fragment> : <React.Fragment>
              <Icon name={busy ? 'sparkles' : 'image'} size={26} />
              {busy ? 'Feldolgozás…' : 'Fotó hozzáadása'}
            </React.Fragment>}
            <input ref={fileRef} type="file" accept="image/*" onChange={onPhoto} style={{ display: 'none' }} />
          </div>

          <div style={{ height: 16 }} />
          <div className="field"><label>Név *</label><input className="input" value={form.name} placeholder="pl. Monstera a nappaliban" onChange={e => set('name', e.target.value)} /></div>
          <div className="field"><label>Faj / fajta</label><input className="input" value={form.species} placeholder="pl. Monstera deliciosa" onChange={e => set('species', e.target.value)} /></div>
          <div className="field"><label>Helyszín <span className="muted-3" style={{ fontWeight: 600 }}>· szoba / sarok</span></label><input className="input" value={form.location} placeholder="pl. Nappali, déli ablak" onChange={e => set('location', e.target.value)} /></div>
          <div className="field">
            <label>Tárolás · hol tartod</label>
            <div className="preset-row">
              {[['indoor', '🏠 Bent (lakásban)'], ['outdoor', '🌳 Kint (kert/erkély)']].map(([k, l]) => (
                <button key={k} className={cls('preset', (form.placement || 'indoor') === k && 'on')} onClick={() => set('placement', k)}>{l}</button>
              ))}
            </div>
          </div>
          {form.placement === 'outdoor' && (
            <div className="field">
              <label>📍 Település <span className="muted-3" style={{ fontWeight: 600 }}>· időjárás-alapú öntözéshez</span></label>
              <input className="input" value={form.city} placeholder="pl. Szeged, Gödöllő, a falud neve…" onChange={e => set('city', e.target.value)} />
            </div>
          )}
          <div className="field">
            <label>Fényigény</label>
            <select className="select" value={form.light} onChange={e => set('light', e.target.value)}>
              {LIGHT_LEVELS.map(l => <option key={l.key} value={l.key}>{l.emoji} {l.label}</option>)}
            </select>
          </div>

          <div className="field">
            <label>Öntözés gyakorisága · {form.waterIntervalDays ? plural(form.waterIntervalDays, 'naponta', 'naponta') : 'nincs'}</label>
            <div className="preset-row">
              {WATER_PRESETS.map(d => <button key={d} className={cls('preset', form.waterIntervalDays === d && 'on')} onClick={() => set('waterIntervalDays', d)}>{d} nap</button>)}
            </div>
          </div>
          <div className="field">
            <label>Tápoldat gyakorisága · {form.fertilizeIntervalDays ? plural(form.fertilizeIntervalDays, 'naponta', 'naponta') : 'nincs'}</label>
            <div className="preset-row">
              {FERT_PRESETS.map(d => <button key={d} className={cls('preset', form.fertilizeIntervalDays === d && 'on')} onClick={() => set('fertilizeIntervalDays', d)}>{d === 0 ? 'Nincs' : d + ' nap'}</button>)}
            </div>
          </div>
          <div className="sec-title" style={{ margin: '2px 0 10px' }}>🪴 Cserép és föld</div>
          <div className="care-card" style={{ marginBottom: 16 }}>
            {!editing && otherPlants.length > 0 && (
              <div className="field" style={{ marginBottom: 12 }}>
                <label>Hová ülteted?</label>
                <div className="preset-row">
                  {[['own', '🪴 Saját / új cserépbe'], ['share', '👯 Közös cserépbe']].map(([k, l]) => (
                    <button key={k} className={cls('preset', (form.potMode || 'own') === k && 'on')} onClick={() => set('potMode', k)}>{l}</button>
                  ))}
                </div>
              </div>
            )}
            {(!editing && form.potMode === 'share') ? (
              <div className="field" style={{ marginBottom: 0 }}>
                <label>Melyik növény cserepébe? <span className="muted-3" style={{ fontWeight: 600 }}>· egy cserépbe több növény</span></label>
                <select className="select" value={form.sharePlantId || ''} onChange={e => set('sharePlantId', e.target.value)}>
                  <option value="">— válassz növényt —</option>
                  {otherPlants.map(p => <option key={p.id} value={p.id}>{p.name}{potLabel(p.pot) ? ' · ' + potLabel(p.pot) : ''}</option>)}
                </select>
                <div className="muted-3" style={{ fontSize: 11.5, lineHeight: 1.5, marginTop: 10 }}>A növény a kiválasztott cserépbe kerül a társa mellé – a leltár nem változik.</div>
              </div>
            ) : (
              <React.Fragment>
                {invPots.length > 0 && (
                  <div className="field" style={{ marginBottom: 12 }}>
                    <label>Cserép a leltárból</label>
                    <select className="select" value={form.potInvId || ''} onChange={e => {
                      const it = invPots.find(x => x.id === e.target.value);

                <div className="field" style={{ marginBottom: 12 }}>
                  <label>Cserép formája</label>

                {form.potShape === 'square' ? (

                    <div className="field" style={{ marginBottom: 0 }}><label>Hossz (cm)</label><input className="input" type="number" inputMode="numeric" value={form.potLen} placeholder="pl. 30" onChange={e => setPotField({ potLen: e.target.value, potInvId: null })} /></div>
                    <div className="field" style={{ marginBottom: 0 }}><label>Szél. (cm)</label><input className="input" type="number" inputMode="numeric" value={form.potWid} placeholder="pl. 15" onChange={e => setPotField({ potWid: e.target.value, potInvId: null })} /></div>
                    <div className="field" style={{ marginBottom: 0 }}><label>Mag. (cm)</label><input className="input" type="number" inputMode="numeric" value={form.potHt} placeholder="pl. 18" onChange={e => setPotField({ potHt: e.target.value, potInvId: null })} /></div>

                ) : (
                  <div className="field-row">
                    <div className="field" style={{ marginBottom: 0 }}><label>Átmérő (cm)</label><input className="input" type="number" inputMode="numeric" value={form.potDia} placeholder="pl. 18" onChange={e => setPotField({ potDia: e.target.value, potInvId: null })} /></div>
                    <div className="field" style={{ marginBottom: 0 }}><label>Magasság (cm)</label><input className="input" type="number" inputMode="numeric" value={form.potHt} placeholder="pl. 16" onChange={e => setPotField({ potHt: e.target.value, potInvId: null })} /></div>
                  </div>
                )}
                <div className="field" style={{ margin: '12px 0 0' }}>
                  <label>Hány db ebből a cserépből? <span className="muted-3" style={{ fontWeight: 600 }}>· pl. lebomló cserépnél több is</span></label>
                  <div className="stepper">
                    <button type="button" onClick={() => set('potQty', Math.max(1, (Number(form.potQty) || 1) - 1))}>−</button>
                    <input className="val" style={{ border: 'none', background: 'transparent', width: 60, textAlign: 'center' }} type="number" inputMode="numeric" value={form.potQty} onChange={e => set('potQty', e.target.value)} />
                    <button type="button" onClick={() => set('potQty', (Number(form.potQty) || 1) + 1)}>+</button>

                <div className="field" style={{ margin: '12px 0 0' }}>
                  <label>Föld / közeg</label>
                  {invSoils.length > 0 && (
                    <select className="select" style={{ marginBottom: 8 }} value={form.soilInvId || ''} onChange={e => {
                      const it = invSoils.find(x => x.id === e.target.value);
                      setForm(f => ({ ...f, soilInvId: it ? it.id : null, soil: it ? (it.name + (it.size ? ' (' + it.size + ')' : '')) : f.soil }));
                    }}>
                      <option value="">— leltárból / egyéni —</option>
                      {invSoils.map(it => <option key={it.id} value={it.id}>{it.name}{it.qty != null ? ` · ${it.qty} ${it.unit || 'l'} raktáron` : ''}</option>)}

                  )}
                  <input className="input" value={form.soil} placeholder="pl. Univerzális virágföld + perlit" onChange={e => set('soil', e.target.value)} />
                </div>
                <div className="field-row" style={{ marginTop: 12 }}>
                  <div className="field" style={{ marginBottom: 0 }}><label>Felhasznált föld (l) <span className="muted-3" style={{ fontWeight: 600 }}>· becsült</span></label><input className="input" type="number" inputMode="decimal" value={form.soilUsedL} placeholder="pl. 3" onChange={e => setForm(f => ({ ...f, soilUsedL: e.target.value, soilTouched: true }))} /></div>
                  {invPlanters.length > 0 && (
                    <div className="field" style={{ marginBottom: 0 }}><label>Kaspó (leltárból)</label>
                      <select className="select" value={form.planterInvId || ''} onChange={e => { const it = invPlanters.find(x => x.id === e.target.value); setForm(f => ({ ...f, planterInvId: it ? it.id : null, planter: it ? it.name : '' })); }}>
                        <option value="">— nincs —</option>
                        {invPlanters.map(it => <option key={it.id} value={it.id}>{it.name}{it.size ? ' · ' + it.size : ''}{it.qty != null ? ` (${it.qty})` : ''}</option>)}
                      </select>
                    </div>
                  )}
                </div>
                {invTrays.length > 0 && (
                  <div className="field" style={{ marginTop: 12, marginBottom: 0 }}><label>Tálca (leltárból)</label>
                    <select className="select" value={form.trayInvId || ''} onChange={e => { const it = invTrays.find(x => x.id === e.target.value); setForm(f => ({ ...f, trayInvId: it ? it.id : null, tray: it ? (it.name + (it.size ? ' (' + it.size + ')' : '')) : '' })); }}>
                      <option value="">— nincs —</option>
                      {invTrays.map(it => <option key={it.id} value={it.id}>{it.name}{it.size ? ' · ' + it.size : ''}{it.qty != null ? ` (${it.qty})` : ''}</option>)}
