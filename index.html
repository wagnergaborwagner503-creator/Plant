            <label>Tápoldat gyakorisága · {form.fertilizeIntervalDays ? plural(form.fertilizeIntervalDays, 'naponta', 'naponta') : 'nincs'}</label>
            <div className="preset-row">
              {FERT_PRESETS.map(d => <button key={d} className={cls('preset', form.fertilizeIntervalDays === d && 'on')} onClick={() => set('fertilizeIntervalDays', d)}>{d === 0 ? 'Nincs' : d + ' nap'}</button>)}
            </div>
          </div>
          <div className="field"><label>Talaj</label><input className="input" value={form.soil} placeholder="pl. Univerzális + perlit" onChange={e => set('soil', e.target.value)} /></div>
          <div className="field"><label>Jegyzet</label><textarea className="textarea" value={form.notes} placeholder="Bármi fontos tudnivaló…" onChange={e => set('notes', e.target.value)} /></div>

          {editing && (
            <div style={{ marginTop: 6 }}>
              {!confirmDel ? (
                <button className="btn btn-danger btn-block" onClick={() => setConfirmDel(true)}><Icon name="trash" size={17} />Növény törlése</button>
              ) : (
                <div className="card-pad" style={{ background: tint('#e5484d', .08), borderRadius: 'var(--r)' }}>
                  <div style={{ fontWeight: 700, marginBottom: 10, fontSize: 14 }}>Törlöd „{editing.name}” növényt és a naplóját?</div>
                  <div className="row" style={{ gap: 10 }}>
                    <button className="btn btn-ghost" style={{ flex: 1 }} onClick={() => setConfirmDel(false)}>Mégse</button>
                    <button className="btn btn-danger" style={{ flex: 1 }} onClick={() => { deletePlant(editing.id); toast('Növény törölve', '🗑️'); close(); }}>Törlés</button>
                  </div>
                </div>
              )}
            </div>
          )}
        </Sheet>
      );
    }

    /* ============================ GYORS NAPLÓZÁS ============================ */
    function QuickLog({ presetPlant, close }) {
      const { data, addEvent, toast } = useStore();
      const [plantId, setPlantId] = useState(presetPlant || (data.plants[0] && data.plants[0].id) || '');
      const [type, setType] = useState('water');
      const [date, setDate] = useState(todayISO());
      const [note, setNote] = useState('');

      const save = () => {
        if (!plantId) { toast('Válassz növényt', '🌱'); return; }
        addEvent({ plantId, type, date, note: note.trim() });
        const p = data.plants.find(x => x.id === plantId);
        toast(`${p ? p.name : 'Növény'} ${ET[type].verb}`, ET[type].emoji);
        close();
      };

      if (data.plants.length === 0) {
        return <Sheet title="Gondozás rögzítése" onClose={close}><div className="empty"><div style={{ fontSize: 30, marginBottom: 8 }}>🌱</div><div className="empty-text">Előbb adj hozzá egy növényt!</div></div></Sheet>;
      }

      return (
        <Sheet title="Gondozás rögzítése" onClose={close}
          foot={<React.Fragment>
            <button className="btn btn-ghost" style={{ flex: 1 }} onClick={close}>Mégse</button>
            <button className="btn btn-primary" style={{ flex: 2 }} onClick={save}><Icon name="check" size={18} />Rögzítés</button>
          </React.Fragment>}>
          <div className="field">
            <label>Növény</label>
            <select className="select" value={plantId} onChange={e => setPlantId(e.target.value)}>
              {data.plants.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Típus</label>
            <div className="ql-grid">
              {EVENT_TYPES.map(t => (
                <button key={t.key} className="ql-tile" style={{ borderColor: type === t.key ? t.color : 'var(--border)', background: type === t.key ? tint(t.color, .12) : 'var(--surface-2)', color: type === t.key ? t.color : 'var(--text-2)' }} onClick={() => setType(t.key)}>
                  <span className="ql-emoji">{t.emoji}</span>{t.label}
                </button>
              ))}
            </div>
          </div>
          <div className="field"><label>Dátum</label><input className="input" type="date" value={date} max={todayISO()} onChange={e => setDate(e.target.value)} /></div>
          <div className="field"><label>Jegyzet (opcionális)</label><textarea className="textarea" value={note} placeholder="pl. felső 3 cm száraz volt…" onChange={e => setNote(e.target.value)} style={{ minHeight: 70 }} /></div>
        </Sheet>
      );
    }

    /* ============================ BEJEGYZÉS SZERKESZTÉSE ============================ */
    function EventEdit({ eventId, close }) {
      const { data, updateEvent, deleteEvent, toast } = useStore();
      const ev = data.events.find(e => e.id === eventId);
      const [type, setType] = useState(ev ? ev.type : 'water');
      const [date, setDate] = useState(ev ? ev.date : todayISO());
      const [note, setNote] = useState(ev ? (ev.note || '') : '');
      if (!ev) { close(); return null; }
      const plant = data.plants.find(p => p.id === ev.plantId);
      const save = () => { updateEvent(eventId, { type, date, note: note.trim() }); toast('Bejegyzés frissítve', '✅'); close(); };
      return (
        <Sheet title="Bejegyzés szerkesztése" onClose={close}
          foot={<React.Fragment>
            <button className="btn btn-ghost" style={{ flex: 1 }} onClick={close}>Mégse</button>
            <button className="btn btn-primary" style={{ flex: 2 }} onClick={save}><Icon name="check" size={18} />Mentés</button>
          </React.Fragment>}>
          {plant && <div className="muted" style={{ marginBottom: 14, fontWeight: 600 }}>🌱 {plant.name}</div>}
          <div className="field">
            <label>Típus</label>
            <div className="ql-grid">
              {EVENT_TYPES.map(t => (
                <button key={t.key} className="ql-tile" style={{ borderColor: type === t.key ? t.color : 'var(--border)', background: type === t.key ? tint(t.color, .12) : 'var(--surface-2)', color: type === t.key ? t.color : 'var(--text-2)' }} onClick={() => setType(t.key)}>
                  <span className="ql-emoji">{t.emoji}</span>{t.label}
                </button>
              ))}
            </div>
          </div>
          <div className="field"><label>Dátum <span className="muted-3" style={{ fontWeight: 600 }}>· ettől számol az app</span></label><input className="input" type="date" value={date} max={todayISO()} onChange={e => setDate(e.target.value)} /></div>
          <div className="field"><label>Jegyzet</label><textarea className="textarea" value={note} placeholder="Megjegyzés…" onChange={e => setNote(e.target.value)} style={{ minHeight: 70 }} /></div>
          <button className="btn btn-danger btn-block" onClick={() => { deleteEvent(eventId); toast('Bejegyzés törölve', '🗑️'); close(); }}><Icon name="trash" size={17} />Bejegyzés törlése</button>
        </Sheet>
      );
    }

    /* ============================ NAP ESEMÉNYEI ============================ */
    function DayModal({ iso, close, openPlant, addForDay }) {
      const { data, deleteEvent } = useStore();
      const evs = data.events.filter(e => e.date === iso).sort((a, b) => b.createdAt.localeCompare(a.createdAt));
      return (
        <Sheet title={fmtDateLong(iso)} onClose={close}
          foot={<button className="btn btn-primary btn-block" onClick={() => { close(); addForDay(iso); }}><Icon name="plus" size={18} />Esemény hozzáadása</button>}>
          {evs.length === 0 ? <div className="empty"><div style={{ fontSize: 28, marginBottom: 8 }}>🌿</div><div className="empty-text">Ezen a napon nincs naplózott esemény.</div></div> : (
            <div className="timeline">
              {evs.map(e => {
                const p = data.plants.find(x => x.id === e.plantId); const t = ET[e.type];
                return (
                  <div className="tl-item" key={e.id}>
                    <div className="tl-ic" style={{ background: tint(t.color, .14) }}>{t.emoji}</div>
                    <div className="tl-main" style={{ cursor: p ? 'pointer' : 'default' }} onClick={() => { if (p) { close(); openPlant(p.id); } }}>
                      <div className="tl-type">{t.label} · <span className="muted" style={{ fontWeight: 600 }}>{p ? p.name : '—'}</span></div>
                      {e.note && <div className="tl-note">{e.note}</div>}
                    </div>
                    <button className="iconbtn danger" style={{ width: 34, height: 34 }} onClick={() => deleteEvent(e.id)}><Icon name="trash" size={16} /></button>
                  </div>
                );
              })}
            </div>
          )}
        </Sheet>
      );
    }

    /* ============================ SHEET / FAB MENÜ ============================ */
    function Sheet({ title, onClose, children, foot }) {
      useEffect(() => {
        const fn = e => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', fn);
        return () => window.removeEventListener('keydown', fn);
      }, [onClose]);
      return (
        <div className="backdrop" onClick={onClose}>
          <div className="sheet" onClick={e => e.stopPropagation()}>
            <div className="sheet-handle" />
            <div className="sheet-head">
              <div className="sheet-title">{title}</div>
              <button className="iconbtn" onClick={onClose} aria-label="Bezárás"><Icon name="x" size={20} /></button>
            </div>
            <div className="sheet-body">{children}</div>
            {foot && <div className="sheet-foot">{foot}</div>}
          </div>
        </div>
      );
    }

    function FabMenu({ close, onAddPlant, onLog }) {
      return (
        <Sheet title="Mit szeretnél?" onClose={close}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <button className="action-item" onClick={() => { close(); onAddPlant(); }}>
              <div className="action-ic" style={{ background: tint('#16a34a', .14), color: '#16a34a' }}><Icon name="leaf" size={22} /></div>
              <div><div style={{ fontWeight: 700 }}>Új növény</div><div className="muted" style={{ fontSize: 13 }}>Hozzáadás a gyűjteményhez</div></div>
            </button>
            <button className="action-item" onClick={() => { close(); onLog(); }}>
              <div className="action-ic" style={{ background: tint('#2b9fe6', .14), color: '#2b9fe6' }}><Icon name="drop" size={22} /></div>
              <div><div style={{ fontWeight: 700 }}>Gondozás rögzítése</div><div className="muted" style={{ fontSize: 13 }}>Öntözés, tápoldat, átültetés…</div></div>
            </button>
          </div>
        </Sheet>
      );
    }

    /* ============================ APP ============================ */
    const NAV = [
      { key: 'dashboard', label: 'Kezdő', icon: 'home' },
      { key: 'plants', label: 'Növények', icon: 'leaf' },
      { key: 'calendar', label: 'Naptár', icon: 'calendar' },
      { key: 'stats', label: 'Statisztika', icon: 'chart' },
      { key: 'settings', label: 'Beállítások', icon: 'settings' },
    ];

    function App() {
      const [view, setView] = useState('dashboard');
      const [detail, setDetail] = useState(null);
      const [modal, setModal] = useState(null); // {type, ...}

      const openPlant = id => { setDetail(id); setView('plants'); window.scrollTo && window.scrollTo(0, 0); };
      const go = v => { if (v === 'add') { setModal({ type: 'form' }); return; } setDetail(null); setView(v); };

      const closeModal = () => setModal(null);
      const showFab = ['dashboard', 'plants', 'calendar'].includes(view) && !detail;

      let main;
      if (detail) main = <PlantDetail plantId={detail} back={() => setDetail(null)} edit={id => setModal({ type: 'form', plantId: id })} editEvent={id => setModal({ type: 'event', eventId: id })} logFor={id => setModal({ type: 'log', plant: id })} />;
      else if (view === 'dashboard') main = <Dashboard go={go} openPlant={openPlant} quickLog={() => setModal({ type: 'log' })} />;
      else if (view === 'plants') main = <PlantsList openPlant={openPlant} quickLog={() => setModal({ type: 'log' })} />;
      else if (view === 'calendar') main = <CalendarView openPlant={openPlant} openDay={iso => setModal({ type: 'day', iso })} />;
      else if (view === 'stats') main = <StatsView />;
      else if (view === 'settings') main = <SettingsView />;

      return (
        <div className="app">
          <aside className="sidebar">
            <div className="side-brand brand">
              <div className="brand-mark"><Icon name="leaf" size={21} /></div>
              <div><div className="brand-name">Palánta</div><div className="brand-sub">növénynapló</div></div>
            </div>
            <nav className="side-nav">
              {NAV.map(n => (
                <button key={n.key} className={cls('side-btn', view === n.key && !detail && 'on')} onClick={() => go(n.key)}>
                  <Icon name={n.icon} size={20} />{n.label}
                </button>
              ))}
            </nav>
            <button className="btn btn-primary" onClick={() => setModal({ type: 'fab' })}><Icon name="plus" size={18} />Új</button>
          </aside>

          <div className="content">
            <header className="topbar">
              <div className="brand">
                <div className="brand-mark"><Icon name="leaf" size={21} /></div>
                <div><div className="brand-name">Palánta</div><div className="brand-sub">növénynapló</div></div>
              </div>
            </header>

            <main className="scroll">
              <div className="page" key={view + (detail || '')}>{main}</div>
            </main>
          </div>

          <nav className="bottomnav">
            {NAV.map(n => (
              <button key={n.key} className={cls('navbtn', view === n.key && !detail && 'on')} onClick={() => go(n.key)}>
                <Icon name={n.icon} size={22} className="ni" sw={view === n.key && !detail ? 2.4 : 2} />
                {n.label}
              </button>
            ))}
          </nav>

          {showFab && <button className="fab" onClick={() => setModal({ type: 'fab' })} aria-label="Hozzáadás"><Icon name="plus" size={26} sw={2.4} /></button>}

          {modal && modal.type === 'fab' && <FabMenu close={closeModal} onAddPlant={() => setModal({ type: 'form' })} onLog={() => setModal({ type: 'log' })} />}
          {modal && modal.type === 'form' && <PlantForm plantId={modal.plantId} close={closeModal} />}
          {modal && modal.type === 'log' && <QuickLog presetPlant={modal.plant} close={closeModal} />}
          {modal && modal.type === 'day' && <DayModal iso={modal.iso} close={closeModal} openPlant={openPlant} addForDay={iso => setModal({ type: 'log' })} />}
          {modal && modal.type === 'event' && <EventEdit eventId={modal.eventId} close={closeModal} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <StoreProvider><App /></StoreProvider>
    );
  </script>

  <!-- Service worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW hiba', e));
      });
    }
  </script>
</body>
</html>
