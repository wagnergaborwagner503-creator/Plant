                  <button type="button" className="kit-chip" style={{ marginTop: 14, width: '100%', justifyContent: 'space-between' }} onClick={() => set('deductInv', !form.deductInv)}>
                    <span>📦 Vond le a felhasznált cserepet / földet a leltárból</span>
                    <span className={cls('switch', form.deductInv && 'on')} style={{ pointerEvents: 'none' }} />
                  </button>
                )}
                <div className="muted-3" style={{ fontSize: 11.5, lineHeight: 1.5, marginTop: 12 }}>
                  {editing
                    ? 'Átültetéshez / cserépcseréhez használd a növény oldalán a „🪴 Átültetés” gombot – az a régi cserepet visszateszi a leltárba, az újat hozzárendeli, és levonja a felhasznált földet.'
                    : (form.deductInv
                      ? 'A föld mennyiségét a méretből megbecsüljük (módosíthatod). Mentéskor a leltári cserép −1 db, a föld −annyi liter lesz. Ha a növény a saját cserepével érkezett, kapcsold ki.'
                      : 'A leltár nem változik – pl. ha a növény a saját cserepével érkezett. (Az később, átültetéskor kerül vissza a leltárba.)')}
                </div>
              </React.Fragment>
            )}
          </div>
          <div className="field"><label>Jegyzet</label><textarea className="textarea" value={form.notes} placeholder="Bármi fontos tudnivaló…" onChange={e => set('notes', e.target.value)} /></div>

          {editing && (
            <div style={{ marginTop: 6 }}>
              {!confirmDel ? (
                <button className="btn btn-danger btn-block" onClick={() => setConfirmDel(true)}><Icon name="trash" size={17} />Növény törlése</button>
              ) : (
                <div className="card-pad" style={{ background: tint('#e5484d', .08), borderRadius: 'var(--r)' }}>
                  <div style={{ fontWeight: 700, marginBottom: 10, fontSize: 14 }}>Törlöd „{editing.name}” növényt és a naplóját?</div>
                  <div className="row" style={{ gap: 10 }}>
                    <button className="btn btn-ghost" style={{ flex: 1 }} onClick={() => setConfirmDel(false)}>Mégse</button>
                    <button className="btn btn-danger" style={{ flex: 1 }} onClick={() => { deletePlant(editing.id); toast('Növény törölve', '🗑️'); close(); }}>Törlés</button>
                  </div>
                </div>
              )}
            </div>
          )}
        </Sheet>
      );
    }

    /* ============================ GYORS NAPLÓZÁS ============================ */
    function QuickLog({ presetPlant, close }) {
      const { data, addEvent, toast } = useStore();
      const [plantId, setPlantId] = useState(presetPlant || (data.plants[0] && data.plants[0].id) || '');
      const [type, setType] = useState('water');
      const [date, setDate] = useState(todayISO());
      const [note, setNote] = useState('');

      const save = () => {
        if (!plantId) { toast('Válassz növényt', '🌱'); return; }
        addEvent({ plantId, type, date, note: note.trim() });
        const p = data.plants.find(x => x.id === plantId);
        toast(`${p ? p.name : 'Növény'} ${ET[type].verb}`, ET[type].emoji);
        close();
      };

      if (data.plants.length === 0) {
        return <Sheet title="Gondozás rögzítése" onClose={close}><div className="empty"><div style={{ fontSize: 30, marginBottom: 8 }}>🌱</div><div className="empty-text">Előbb adj hozzá egy növényt!</div></div></Sheet>;
      }

      return (
        <Sheet title="Gondozás rögzítése" onClose={close}
          foot={<React.Fragment>
            <button className="btn btn-ghost" style={{ flex: 1 }} onClick={close}>Mégse</button>
            <button className="btn btn-primary" style={{ flex: 2 }} onClick={save}><Icon name="check" size={18} />Rögzítés</button>
          </React.Fragment>}>
          <div className="field">
            <label>Növény</label>
            <select className="select" value={plantId} onChange={e => setPlantId(e.target.value)}>
              {data.plants.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Típus</label>
            <div className="ql-grid">
              {EVENT_TYPES.map(t => (
                <button key={t.key} className="ql-tile" style={{ borderColor: type === t.key ? t.color : 'var(--border)', background: type === t.key ? tint(t.color, .12) : 'var(--surface-2)', color: type === t.key ? t.color : 'var(--text-2)' }} onClick={() => setType(t.key)}>
                  <span className="ql-emoji">{t.emoji}</span>{t.label}
                </button>
              ))}
            </div>
          </div>
          <div className="field"><label>Dátum</label><input className="input" type="date" value={date} max={todayISO()} onChange={e => setDate(e.target.value)} /></div>
          <div className="field"><label>Jegyzet (opcionális)</label><textarea className="textarea" value={note} placeholder="pl. felső 3 cm száraz volt…" onChange={e => setNote(e.target.value)} style={{ minHeight: 70 }} /></div>
        </Sheet>
      );
    }

    /* ============================ BEJEGYZÉS SZERKESZTÉSE ============================ */
    function EventEdit({ eventId, close }) {
      const { data, updateEvent, deleteEvent, toast } = useStore();
      const ev = data.events.find(e => e.id === eventId);
      const [type, setType] = useState(ev ? ev.type : 'water');
      const [date, setDate] = useState(ev ? ev.date : todayISO());
      const [note, setNote] = useState(ev ? (ev.note || '') : '');
      if (!ev) { close(); return null; }
      const plant = data.plants.find(p => p.id === ev.plantId);
      const save = () => { updateEvent(eventId, { type, date, note: note.trim() }); toast('Bejegyzés frissítve', '✅'); close(); };
      return (
        <Sheet title="Bejegyzés szerkesztése" onClose={close}
          foot={<React.Fragment>
            <button className="btn btn-ghost" style={{ flex: 1 }} onClick={close}>Mégse</button>
            <button className="btn btn-primary" style={{ flex: 2 }} onClick={save}><Icon name="check" size={18} />Mentés</button>
          </React.Fragment>}>
          {plant && <div className="muted" style={{ marginBottom: 14, fontWeight: 600 }}>🌱 {plant.name}</div>}
          <div className="field">
            <label>Típus</label>
            <div className="ql-grid">
              {EVENT_TYPES.map(t => (
                <button key={t.key} className="ql-tile" style={{ borderColor: type === t.key ? t.color : 'var(--border)', background: type === t.key ? tint(t.color, .12) : 'var(--surface-2)', color: type === t.key ? t.color : 'var(--text-2)' }} onClick={() => setType(t.key)}>
                  <span className="ql-emoji">{t.emoji}</span>{t.label}
                </button>
              ))}
            </div>
          </div>
          <div className="field"><label>Dátum <span className="muted-3" style={{ fontWeight: 600 }}>· ettől számol az app</span></label><input className="input" type="date" value={date} max={todayISO()} onChange={e => setDate(e.target.value)} /></div>
          <div className="field"><label>Jegyzet</label><textarea className="textarea" value={note} placeholder="Megjegyzés…" onChange={e => setNote(e.target.value)} style={{ minHeight: 70 }} /></div>
          <button className="btn btn-danger btn-block" onClick={() => { deleteEvent(eventId); toast('Bejegyzés törölve', '🗑️'); close(); }}><Icon name="trash" size={17} />Bejegyzés törlése</button>
        </Sheet>
      );
    }

    /* ============================ NAP ESEMÉNYEI ============================ */
    function DayModal({ iso, close, openPlant, addForDay }) {
      const { data, deleteEvent, addEvent, toast } = useStore();
      const evs = data.events.filter(e => e.date === iso).sort((a, b) => b.createdAt.localeCompare(a.createdAt));
      const isToday = iso === todayISO();
      const isFuture = iso > todayISO();
      const tasks = (iso >= todayISO()) ? tasksForDay(data.plants, data.events, iso) : [];
      const logTask = (plantId, type) => { addEvent({ plantId, type, date: iso }); const p = data.plants.find(x => x.id === plantId); toast(`${p ? p.name : 'Növény'} ${ET[type].verb}`, ET[type].emoji); };

      return (
        <Sheet title={fmtDateLong(iso)} onClose={close}
          foot={<button className="btn btn-primary btn-block" onClick={() => { close(); addForDay(iso); }}><Icon name="plus" size={18} />Esemény hozzáadása</button>}>

          {tasks.length > 0 && (
            <div style={{ marginBottom: evs.length ? 20 : 0 }}>
              <div className="sec-title" style={{ marginBottom: 10 }}>{isFuture ? `Várható teendők (${relDay(iso)})` : 'Mai teendők'}</div>
              {tasks.map(({ plant, type, info }, ti) => {
                const t = ET[type];
                return (
                  <div className="due-row" key={plant.id + type + ti} style={{ borderStyle: isFuture ? 'dashed' : 'solid', alignItems: 'flex-start' }}>
                    <div className="tl-ic" style={{ background: tint(t.color, .14), width: 42, height: 42, flexShrink: 0 }}>{t.emoji}</div>
                    <div style={{ flex: 1, minWidth: 0, cursor: 'pointer' }} onClick={() => { close(); openPlant(plant.id); }}>
                      <div style={{ fontWeight: 700, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{plant.name} <span className="muted-3" style={{ fontWeight: 600, fontSize: 12.5 }}>· {t.label}</span></div>
                      <div className="muted" style={{ fontSize: 12.5, lineHeight: 1.4 }}>{info || (plant.location ? plant.location : t.label)}</div>
                    </div>
                    {isToday
                      ? <button className="btn btn-soft btn-sm" style={{ flexShrink: 0 }} onClick={() => logTask(plant.id, type)}><Icon name="check" size={15} />Kész</button>
                      : <span className="muted-3" style={{ fontSize: 12, fontWeight: 700, flexShrink: 0 }}>{relDay(iso)}</span>}
                  </div>
                );
              })}
            </div>
          )}

          {evs.length > 0 && (
            <div>
              {tasks.length > 0 && <div className="sec-title" style={{ marginBottom: 10 }}>Naplózott</div>}
              <div className="timeline">
                {evs.map(e => {
                  const p = data.plants.find(x => x.id === e.plantId); const t = ET[e.type];
                  return (
                    <div className="tl-item" key={e.id}>
                      <div className="tl-ic" style={{ background: tint(t.color, .14) }}>{t.emoji}</div>
                      <div className="tl-main" style={{ cursor: p ? 'pointer' : 'default' }} onClick={() => { if (p) { close(); openPlant(p.id); } }}>
                        <div className="tl-type">{t.label} · <span className="muted" style={{ fontWeight: 600 }}>{p ? p.name : '—'}</span></div>
                        {e.note && <div className="tl-note">{e.note}</div>}
                      </div>
                      <button className="iconbtn danger" style={{ width: 34, height: 34 }} onClick={() => deleteEvent(e.id)}><Icon name="trash" size={16} /></button>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {tasks.length === 0 && evs.length === 0 && (
            <div className="empty"><div style={{ fontSize: 28, marginBottom: 8 }}>{isFuture ? '🗓️' : '🌿'}</div><div className="empty-text">{isFuture ? 'Ezen a napon nincs előrejelzett teendő.' : 'Ezen a napon nincs naplózott esemény.'}</div></div>
          )}
        </Sheet>
      );
    }

    /* ============================ SHEET / FAB MENÜ ============================ */
    function Sheet({ title, onClose, children, foot }) {
      useEffect(() => {
        const fn = e => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', fn);
        return () => window.removeEventListener('keydown', fn);
      }, [onClose]);
      return (
        <div className="backdrop" onClick={onClose}>
          <div className="sheet" onClick={e => e.stopPropagation()}>
            <div className="sheet-handle" />
            <div className="sheet-head">
              <div className="sheet-title">{title}</div>
              <button className="iconbtn" onClick={onClose} aria-label="Bezárás"><Icon name="x" size={20} /></button>
            </div>
            <div className="sheet-body">{children}</div>
            {foot && <div className="sheet-foot">{foot}</div>}
          </div>
        </div>
      );
    }

    function FabMenu({ close, onAddPlant, onLog }) {
      return (
        <Sheet title="Mit szeretnél?" onClose={close}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <button className="action-item" onClick={() => { close(); onAddPlant(); }}>
              <div className="action-ic" style={{ background: tint('#16a34a', .14), color: '#16a34a' }}><Icon name="leaf" size={22} /></div>
              <div><div style={{ fontWeight: 700 }}>Új növény</div><div className="muted" style={{ fontSize: 13 }}>Hozzáadás a gyűjteményhez</div></div>
            </button>
            <button className="action-item" onClick={() => { close(); onLog(); }}>
              <div className="action-ic" style={{ background: tint('#2b9fe6', .14), color: '#2b9fe6' }}><Icon name="drop" size={22} /></div>
              <div><div style={{ fontWeight: 700 }}>Gondozás rögzítése</div><div className="muted" style={{ fontSize: 13 }}>Öntözés, tápoldat, átültetés…</div></div>
            </button>
          </div>
        </Sheet>
      );
    }

    /* ============================ TUDÁSTÁR ============================ */
    function KnowledgeBase({ close }) {
      const { data } = useStore();
      const [q, setQ] = useState('');
      const [cat, setCat] = useState('all');
      const [sel, setSel] = useState(null);

      const results = useMemo(() => {
        const s = stripDia(q.trim());
        let arr = PLANT_DB;
        if (cat !== 'all') arr = arr.filter(x => x.c === cat);
        if (s) arr = arr.filter(x => stripDia(x.n).includes(s) || stripDia(x.lat).includes(s) || stripDia(PLANT_CATS[x.c].label).includes(s));
        return [...arr].sort((a, b) => a.n.localeCompare(b.n, 'hu'));
      }, [q, cat]);

      const sp = sel ? SP_BY_KEY[sel] : null;
      const cats = ['all'].concat(Object.keys(PLANT_CATS));

      if (sp) {
        const tips = careAdvice(sp, data.settings.kit);
        return (
          <Sheet title="Tudástár" onClose={close}>
            <button className="btn btn-ghost btn-sm" style={{ marginBottom: 14 }} onClick={() => setSel(null)}><Icon name="arrowL" size={16} />Vissza a listához</button>
            <div className="hero" style={{ marginBottom: 16 }}>
              <div className="hero-photo" style={{ fontSize: 42 }}>{PLANT_CATS[sp.c].emoji}</div>
              <div style={{ flex: 1, minWidth: 0, paddingTop: 6 }}>
                <h2 className="h2">{sp.n}</h2>
                <div className="muted" style={{ fontStyle: 'italic', fontSize: 13.5 }}>{sp.lat}</div>
                <span className="info-chip" style={{ marginTop: 8 }}>{PLANT_CATS[sp.c].emoji} {PLANT_CATS[sp.c].label}</span>
              </div>
            </div>
            <div className="care-card">
              <div className="row wrap" style={{ gap: 6, marginBottom: 13 }}>
                <span className="fact" style={{ color: DIFF[sp.diff].c, background: tint(DIFF[sp.diff].c, .14) }}>● {DIFF[sp.diff].l}</span>
                <span className="fact" style={{ color: 'var(--text-2)', background: 'var(--surface-3)' }}>🌡️ {sp.temp[0]}–{sp.temp[1]}°C</span>
                <span className="fact" style={{ color: 'var(--water)', background: tint('#2b9fe6', .12) }}>💨 {HUM[sp.hum]} pára</span>
                {sp.tox
                  ? <span className="fact" style={{ color: 'var(--overdue)', background: tint('#e5484d', .12) }}>⚠️ Mérgező</span>
                  : <span className="fact" style={{ color: 'var(--ok)', background: tint('#16a34a', .12) }}>✓ Nem mérgező</span>}
              </div>
              {tips.map((tip, i) => <div className="tip" key={i}><span className="te">{tip.e}</span><span>{tip.t}</span></div>)}
              {sp.a && <div className="muted-3" style={{ fontSize: 11.5, marginTop: 12, paddingTop: 12, borderTop: '1px solid var(--border)' }}>ℹ️ Típus szerinti általános gondozás – a konkrét fajtád igénye kissé eltérhet.</div>}
            </div>
          </Sheet>
        );
      }

      return (
        <Sheet title="Tudástár" onClose={close}>
          <div className="row" style={{ position: 'relative', marginBottom: 12 }}>
            <Icon name="search" size={18} className="muted-3" style={{ position: 'absolute', left: 14 }} />
            <input className="input" placeholder="Keress növényre…" value={q} onChange={e => setQ(e.target.value)} style={{ paddingLeft: 42 }} />
          </div>
          <div style={{ display: 'flex', gap: 7, overflowX: 'auto', paddingBottom: 8, marginBottom: 10 }}>
            {cats.map(c => (
              <button key={c} className={cls('kit-chip', cat === c && 'on')} style={{ flexShrink: 0 }} onClick={() => setCat(c)}>
                {c === 'all' ? '🌿 Mind' : `${PLANT_CATS[c].emoji} ${PLANT_CATS[c].label}`}
              </button>
            ))}
          </div>
          <div className="muted-3" style={{ fontSize: 12, fontWeight: 700, marginBottom: 8 }}>{results.length} növény</div>
          {results.length === 0 ? (
            <div className="empty"><div style={{ fontSize: 30, marginBottom: 8 }}>🔍</div><div className="empty-text">Nincs találat.</div></div>
          ) : (
            <div>
              {results.slice(0, 250).map(s => (
                <button key={s.k} className="sp-row" style={{ borderRadius: 10 }} onClick={() => setSel(s.k)}>
                  <span className="sp-emoji">{PLANT_CATS[s.c].emoji}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 700, fontSize: 14 }}>{s.n}</div>
                    <div className="muted-3" style={{ fontSize: 12, fontStyle: 'italic', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.lat}</div>
                  </div>
                  <Icon name="chevR" size={16} className="muted-3" />
                </button>
              ))}
              {results.length > 250 && <div className="muted-3" style={{ textAlign: 'center', fontSize: 12, padding: 12 }}>Finomíts a kereséssel a többi megtekintéséhez…</div>}
            </div>
          )}
        </Sheet>
      );
    }

    /* ============================ KERTÉSZETI LELTÁR ============================ */
    const INV_CATS = [
      { key: 'pot', label: 'Cserép', emoji: '🪴' },
      { key: 'tray', label: 'Tálca', emoji: '🍽️' },
      { key: 'planter', label: 'Kaspó', emoji: '🏺' },
      { key: 'soil', label: 'Föld / közeg', emoji: '🟤' },
      { key: 'fertilizer', label: 'Tápoldat / trágya', emoji: '🌿' },
      { key: 'tool', label: 'Eszköz', emoji: '✂️' },
      { key: 'seed', label: 'Mag / palánta', emoji: '🌱' },
      { key: 'other', label: 'Egyéb', emoji: '📦' },
    ];
    const INV_UNITS = ['db', 'l', 'kg', 'zsák', 'csomag', '—'];

    function InventoryView({ close }) {
      const { data, addInv, updateInv, deleteInv, toast } = useStore();
      const inv = data.inventory || [];
      const [editing, setEditing] = useState(null);
      const [form, setForm] = useState({ name: '', cat: 'pot', shape: 'round', dia: '', len: '', wid: '', ht: '', size: '', qty: 1, unit: 'db', notes: '' });
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const startNew = () => { setForm({ name: '', cat: 'pot', shape: 'round', dia: '', len: '', wid: '', ht: '', size: '', qty: 1, unit: 'db', notes: '' }); setEditing('new'); };
      const startEdit = (it) => { setForm({ name: it.name || '', cat: it.cat || 'other', shape: it.shape || 'round', dia: it.dia || '', len: it.len || '', wid: it.wid || '', ht: it.ht || '', size: it.size || '', qty: it.qty != null ? it.qty : 1, unit: it.unit || 'db', notes: it.notes || '' }); setEditing(it.id); };
      const save = () => {
        if (!form.name.trim()) { toast('Adj megnevezést', '📦'); return; }
        const item = { ...form, qty: Number(form.qty) || 0 };
        if (form.cat === 'pot') {
          item.dia = (form.shape !== 'square' && form.dia) ? Number(form.dia) : '';
          item.len = (form.shape === 'square' && form.len) ? Number(form.len) : '';
          item.wid = (form.shape === 'square' && form.wid) ? Number(form.wid) : '';
          item.ht = form.ht ? Number(form.ht) : '';
          item.size = (item.dia || item.len || item.wid) ? '' : item.size;
        }
        if (editing === 'new') { addInv(item); toast('Hozzáadva a leltárhoz', '📦'); } else { updateInv(editing, item); toast('Mentve', '✅'); }
        setEditing(null);
      };
      const grouped = INV_CATS.map(c => ({ c, items: inv.filter(i => i.cat === c.key) })).filter(g => g.items.length);
      // Felhasznált (a növényekben lévő) cserepek és tálcák – a növényekből származtatva (közös cserép csak egyszer)
      const usedPots = useMemo(() => {
        const byId = {}; let auto = 0;
        (data.plants || []).forEach(p => {
          if (!(p.pot && potHasDims(p.pot))) return;
          const k = p.pot.potId || ('a' + (auto++));
          if (!byId[k]) byId[k] = { label: potLabel(p.pot) || 'Cserép', qty: Math.max(1, Number(p.pot.qty) || 1), names: [] };
          byId[k].names.push(p.name);
        });
        const byLabel = {};
        Object.values(byId).forEach(pot => { const g = (byLabel[pot.label] = byLabel[pot.label] || { label: pot.label, count: 0, names: [] }); g.count += pot.qty; g.names.push(...pot.names); });
        return Object.values(byLabel);
      }, [data.plants]);
      const usedTrays = useMemo(() => {
        const byLabel = {};
        (data.plants || []).forEach(p => { if (p.tray) { const g = (byLabel[p.tray] = byLabel[p.tray] || { label: p.tray, count: 0, names: [] }); g.count++; g.names.push(p.name); } });
        return Object.values(byLabel);
      }, [data.plants]);
      const hasUsed = usedPots.length > 0 || usedTrays.length > 0;

      if (editing) {
        return (
          <Sheet title={editing === 'new' ? 'Új leltártétel' : 'Tétel szerkesztése'} onClose={() => setEditing(null)}
            foot={<React.Fragment>
              <button className="btn btn-ghost" style={{ flex: 1 }} onClick={() => setEditing(null)}>Mégse</button>
              <button className="btn btn-primary" style={{ flex: 2 }} onClick={save}><Icon name="check" size={18} />Mentés</button>
            </React.Fragment>}>
            <div className="field"><label>Megnevezés *</label><input className="input" value={form.name} placeholder="pl. Cserép, Univerzális föld, Metszőolló…" onChange={e => set('name', e.target.value)} /></div>
            <div className="field"><label>Kategória</label>
              <select className="select" value={form.cat} onChange={e => set('cat', e.target.value)}>
                {INV_CATS.map(c => <option key={c.key} value={c.key}>{c.emoji} {c.label}</option>)}
              </select>
            </div>
            {form.cat === 'pot' ? (
              <React.Fragment>
                <div className="field"><label>Forma</label>
                  <div className="preset-row">
                    {[['round', '⭕ Kerek'], ['square', '⬛ Négyzet']].map(([k, l]) => (
                      <button key={k} className={cls('preset', (form.shape || 'round') === k && 'on')} onClick={() => set('shape', k)}>{l}</button>
                    ))}
                  </div>
                </div>
                {form.shape === 'square' ? (
                  <div className="field-row" style={{ gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
                    <div className="field"><label>Hossz (cm)</label><input className="input" type="number" inputMode="numeric" value={form.len} placeholder="pl. 30" onChange={e => set('len', e.target.value)} /></div>
                    <div className="field"><label>Szél. (cm)</label><input className="input" type="number" inputMode="numeric" value={form.wid} placeholder="pl. 15" onChange={e => set('wid', e.target.value)} /></div>
                    <div className="field"><label>Mag. (cm)</label><input className="input" type="number" inputMode="numeric" value={form.ht} placeholder="pl. 18" onChange={e => set('ht', e.target.value)} /></div>
                  </div>
                ) : (
                  <div className="field-row">
                    <div className="field"><label>Átmérő (cm)</label><input className="input" type="number" inputMode="numeric" value={form.dia} placeholder="pl. 18" onChange={e => set('dia', e.target.value)} /></div>
                    <div className="field"><label>Magasság (cm)</label><input className="input" type="number" inputMode="numeric" value={form.ht} placeholder="pl. 16" onChange={e => set('ht', e.target.value)} /></div>
                  </div>
                )}
              </React.Fragment>
            ) : (
              <div className="field"><label>Méret / típus (opcionális)</label><input className="input" value={form.size} placeholder="pl. savanyú, 5 literes, 40 cm" onChange={e => set('size', e.target.value)} /></div>
            )}
            <div className="field-row">
              <div className="field"><label>Mennyiség</label>
                <div className="stepper">
                  <button onClick={() => set('qty', Math.max(0, (Number(form.qty) || 0) - 1))}>−</button>
                  <input className="val" style={{ border: 'none', background: 'transparent', width: 60, textAlign: 'center' }} type="number" value={form.qty} onChange={e => set('qty', e.target.value)} />
                  <button onClick={() => set('qty', (Number(form.qty) || 0) + 1)}>+</button>
                </div>
              </div>
              <div className="field"><label>Egység</label>
                <select className="select" value={form.unit} onChange={e => set('unit', e.target.value)}>
                  {INV_UNITS.map(u => <option key={u} value={u}>{u}</option>)}
                </select>
              </div>
            </div>
            <div className="field"><label>Jegyzet</label><textarea className="textarea" value={form.notes} placeholder="Bármi megjegyzés…" style={{ minHeight: 60 }} onChange={e => set('notes', e.target.value)} /></div>
            {editing !== 'new' && <button className="btn btn-danger btn-block" onClick={() => { deleteInv(editing); toast('Törölve', '🗑️'); setEditing(null); }}><Icon name="trash" size={17} />Tétel törlése</button>}
          </Sheet>
        );
      }

      return (
        <Sheet title="Kertészeti leltár" onClose={close}
          foot={<button className="btn btn-primary btn-block" onClick={startNew}><Icon name="plus" size={18} />Új tétel</button>}>
          {inv.length === 0 && !hasUsed ? (
            <div className="empty"><div style={{ fontSize: 30, marginBottom: 8 }}>📦</div><div className="empty-text">Még üres a leltár. Vedd fel a cserepeidet (átmérő × magasság), tálcáidat, földjeidet (hány liter), kaspóidat és eszközeidet – a darabszám utólag bármikor módosítható.</div></div>
          ) : (
            <React.Fragment>
              {grouped.map(({ c, items }) => {
                const free = (c.key === 'pot' || c.key === 'tray');
                return (
                  <div key={c.key} style={{ marginBottom: 16 }}>
                    <div className="sec-title" style={{ marginBottom: 8 }}>{c.emoji} {c.label}{free ? ' · szabad' : ''} <span className="muted-3">({items.length})</span></div>
                    {items.map(it => {
                      const disp = c.key === 'pot' ? (potLabel(it) || it.size) : it.size;
                      return (
                        <button key={it.id} className="set-row" style={{ width: '100%', textAlign: 'left', borderRadius: 12 }} onClick={() => startEdit(it)}>
                          <div className="set-ic" style={{ fontSize: 20 }}>{c.emoji}</div>
                          <div className="set-main">
                            <div className="set-title">{it.name}{disp ? <span className="muted-3" style={{ fontWeight: 600 }}> · {disp}</span> : ''}</div>
                            {it.notes && <div className="set-sub">{it.notes}</div>}
                          </div>
                          <div style={{ fontWeight: 800, fontFamily: 'var(--display)', whiteSpace: 'nowrap' }}>{it.qty} <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-3)' }}>{it.unit !== '—' ? it.unit : ''}</span></div>
                        </button>
                      );
                    })}
                  </div>
                );
              })}
              {hasUsed && (
                <div style={{ marginBottom: 8 }}>
                  <div className="sec-title" style={{ marginBottom: 8 }}>🔒 Felhasznált · növényekben</div>
                  {usedPots.map((g, i) => (
                    <div key={'up' + i} className="set-row" style={{ borderRadius: 12 }}>
                      <div className="set-ic" style={{ fontSize: 20 }}>🪴</div>
                      <div className="set-main"><div className="set-title">Cserép{g.label ? <span className="muted-3" style={{ fontWeight: 600 }}> · {g.label}</span> : ''}</div><div className="set-sub" style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{g.names.join(', ')}</div></div>
                      <div style={{ fontWeight: 800, fontFamily: 'var(--display)', whiteSpace: 'nowrap' }}>{g.count} <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-3)' }}>db</span></div>
                    </div>
                  ))}
                  {usedTrays.map((g, i) => (
                    <div key={'ut' + i} className="set-row" style={{ borderRadius: 12 }}>
                      <div className="set-ic" style={{ fontSize: 20 }}>🍽️</div>
                      <div className="set-main"><div className="set-title">Tálca <span className="muted-3" style={{ fontWeight: 600 }}>· {g.label}</span></div><div className="set-sub" style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{g.names.join(', ')}</div></div>
                      <div style={{ fontWeight: 800, fontFamily: 'var(--display)', whiteSpace: 'nowrap' }}>{g.count} <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-3)' }}>db</span></div>
                    </div>
                  ))}
                  <div className="muted-3" style={{ fontSize: 11.5, lineHeight: 1.5, marginTop: 8 }}>Ezek a növényeidnél lévő cserepek és tálcák. Átültetéskor a felszabaduló cserép visszakerül a „szabad” közé.</div>
                </div>
              )}
            </React.Fragment>
          )}
        </Sheet>
      );
    }

    /* ============================ ÁTÜLTETÉS (cserépcsere + leltár) ============================ */
    function RepotSheet({ plantId, close }) {
      const { data, consumeInv, returnPotToInv, updatePlant, addEvent, toast } = useStore();
      const plant = data.plants.find(p => p.id === plantId);
      const inv = data.inventory || [];
      const invPots = inv.filter(i => i.cat === 'pot');
      const invSoils = inv.filter(i => i.cat === 'soil');
      const [potInvId, setPotInvId] = useState('');
      const [shape, setShape] = useState('round');
      const [dia, setDia] = useState('');
      const [len, setLen] = useState('');
      const [wid, setWid] = useState('');
      const [ht, setHt] = useState('');
      const [soilInvId, setSoilInvId] = useState('');
      const [soilName, setSoilName] = useState(plant ? (plant.soil || '') : '');
      const [soilL, setSoilL] = useState('');
      const [soilTouched, setSoilTouched] = useState(false);
      const [returnOld, setReturnOld] = useState(true);
      if (!plant) { close(); return null; }
      const oldPot = plant.pot || (plant.potSize ? { dia: parsePotDia(plant.potSize), size: plant.potSize } : null);
      const sharedMates = (data.plants || []).filter(p => p.id !== plantId && p.pot && oldPot && oldPot.potId && p.pot.potId === oldPot.potId);

      const autoSoil = (pot) => { if (!soilTouched) { const est = estimateSoilL(pot); if (est != null) setSoilL(est); } };
      const pickPot = (id) => { setPotInvId(id); const it = invPots.find(x => x.id === id); if (it) { const sh = it.shape || 'round'; setShape(sh); setDia(it.dia || ''); setLen(it.len || ''); setWid(it.wid || ''); setHt(it.ht || ''); autoSoil({ shape: sh, dia: it.dia, len: it.len, wid: it.wid, ht: it.ht }); } };
      const confirm = () => {
        const hasDims = shape === 'square' ? (len || wid) : dia;
        const newPot = (hasDims || ht) ? { shape, dia: (shape !== 'square' && dia) ? Number(dia) : '', len: (shape === 'square' && len) ? Number(len) : '', wid: (shape === 'square' && wid) ? Number(wid) : '', ht: ht ? Number(ht) : '', invId: potInvId || null, potId: uid() } : null;
        if (returnOld && oldPot && !sharedMates.length) returnPotToInv(oldPot);
        consumeInv({ potInvId: potInvId || null, soilInvId: soilInvId || null, soilL: soilL ? Number(soilL) : 0 });
        updatePlant(plantId, { pot: newPot || oldPot, potSize: potLabel(newPot) || plant.potSize, soil: soilName || plant.soil, soilUsedL: soilL ? Number(soilL) : (plant.soilUsedL || null) });
        addEvent({ plantId, type: 'repot', note: 'Átültetve' + (newPot && potLabel(newPot) ? ' – ' + potLabel(newPot) : '') });
        toast(`${plant.name} átültetve`, '🪴');
        close();
      };

      return (
        <Sheet title="Átültetés / cserépcsere" onClose={close}
          foot={<React.Fragment>
            <button className="btn btn-ghost" style={{ flex: 1 }} onClick={close}>Mégse</button>
            <button className="btn btn-primary" style={{ flex: 2 }} onClick={confirm}><Icon name="check" size={18} />Átültetés rögzítése</button>
          </React.Fragment>}>
          <div className="muted" style={{ marginBottom: 16, fontWeight: 600 }}>🌱 {plant.name}{oldPot && potLabel(oldPot) ? ' · jelenleg: ' + potLabel(oldPot) : ''}</div>

          <div className="sec-title" style={{ marginBottom: 10 }}>Új cserép</div>
          {invPots.length > 0 && (
            <div className="field"><label>Leltárból</label>
              <select className="select" value={potInvId} onChange={e => pickPot(e.target.value)}>
                <option value="">— egyéni méret megadása —</option>
                {invPots.map(it => <option key={it.id} value={it.id}>{potLabel(it) || it.name}{it.qty != null ? ` · ${it.qty} db raktáron` : ''}</option>)}
              </select>
            </div>
          )}
          <div className="field"><label>Forma</label>
            <div className="preset-row">
              {[['round', '⭕ Kerek'], ['square', '⬛ Négyzet']].map(([k, l]) => (
                <button key={k} className={cls('preset', shape === k && 'on')} onClick={() => { setShape(k); setPotInvId(''); autoSoil({ shape: k, dia, len, wid, ht }); }}>{l}</button>
              ))}
            </div>
          </div>
          {shape === 'square' ? (
            <div className="field-row" style={{ gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
              <div className="field" style={{ marginBottom: 0 }}><label>Hossz (cm)</label><input className="input" type="number" inputMode="numeric" value={len} placeholder="pl. 30" onChange={e => { setLen(e.target.value); setPotInvId(''); autoSoil({ shape: 'square', len: e.target.value, wid, ht }); }} /></div>
              <div className="field" style={{ marginBottom: 0 }}><label>Szél. (cm)</label><input className="input" type="number" inputMode="numeric" value={wid} placeholder="pl. 15" onChange={e => { setWid(e.target.value); setPotInvId(''); autoSoil({ shape: 'square', len, wid: e.target.value, ht }); }} /></div>
              <div className="field" style={{ marginBottom: 0 }}><label>Mag. (cm)</label><input className="input" type="number" inputMode="numeric" value={ht} placeholder="pl. 18" onChange={e => { setHt(e.target.value); setPotInvId(''); autoSoil({ shape: 'square', len, wid, ht: e.target.value }); }} /></div>
            </div>
          ) : (
            <div className="field-row">
              <div className="field" style={{ marginBottom: 0 }}><label>Átmérő (cm)</label><input className="input" type="number" inputMode="numeric" value={dia} placeholder="pl. 22" onChange={e => { setDia(e.target.value); setPotInvId(''); autoSoil({ shape: 'round', dia: e.target.value, ht }); }} /></div>
              <div className="field" style={{ marginBottom: 0 }}><label>Magasság (cm)</label><input className="input" type="number" inputMode="numeric" value={ht} placeholder="pl. 20" onChange={e => { setHt(e.target.value); setPotInvId(''); autoSoil({ shape: 'round', dia, ht: e.target.value }); }} /></div>
            </div>
          )}

          <div className="sec-title" style={{ margin: '18px 0 10px' }}>Föld</div>
          {invSoils.length > 0 && (
            <div className="field"><label>Leltárból</label>
              <select className="select" value={soilInvId} onChange={e => { const it = invSoils.find(x => x.id === e.target.value); setSoilInvId(e.target.value); if (it) setSoilName(it.name + (it.size ? ' (' + it.size + ')' : '')); }}>
                <option value="">— egyéni —</option>
                {invSoils.map(it => <option key={it.id} value={it.id}>{it.name}{it.qty != null ? ` · ${it.qty} ${it.unit || 'l'} raktáron` : ''}</option>)}
              </select>
            </div>
          )}
          <div className="field-row">
            <div className="field" style={{ marginBottom: 0 }}><label>Föld megnevezése</label><input className="input" value={soilName} placeholder="pl. Univerzális" onChange={e => setSoilName(e.target.value)} /></div>
            <div className="field" style={{ marginBottom: 0 }}><label>Felhasznált (l) <span className="muted-3" style={{ fontWeight: 600 }}>· becsült</span></label><input className="input" type="number" inputMode="decimal" value={soilL} placeholder="pl. 4" onChange={e => { setSoilL(e.target.value); setSoilTouched(true); }} /></div>
          </div>

          {sharedMates.length > 0 ? (
            <div className="muted-3" style={{ fontSize: 11.5, lineHeight: 1.5, marginTop: 16 }}>♻️ A régi cserép közös ({sharedMates.map(p => p.name).join(', ')} is benne van), ezért nem kerül vissza a leltárba.</div>
          ) : (oldPot && (potLabel(oldPot) || oldPot.dia || oldPot.len || oldPot.wid)) ? (
            <button type="button" className="kit-chip" style={{ width: '100%', justifyContent: 'space-between', marginTop: 16 }} onClick={() => setReturnOld(!returnOld)}>
              <span>♻️ A régi cserép ({potLabel(oldPot) || 'cserép'}) vissza a leltárba</span>
              <span className={cls('switch', returnOld && 'on')} style={{ pointerEvents: 'none' }} />
            </button>
          ) : null}
          <div className="muted-3" style={{ fontSize: 11.5, lineHeight: 1.5, marginTop: 12 }}>
            A föld mennyiségét a cserép méretéből megbecsüljük (módosíthatod). Rögzítéskor a régi cserép visszakerül a leltárba (+1 db, ha nem közös), a kiválasztott új leltári cserép −1 db, a föld −annyi liter lesz, és új „Átültetés” bejegyzés készül a naplóba.
          </div>
        </Sheet>
      );
    }

    /* ============================ ADATVÉDELMI FIGYELMEZTETÉS ============================ */
    // Ha a böngésző NEM garantálja a tartós tárolást (pl. nem telepített app, iPhone Safari), az adat idővel/kilépéskor törlődhet.
    function DataGuardBanner() {
      const { data, toast } = useStore();
      const [persisted, setPersisted] = useState(null);
      const [dismissed, setDismissed] = useState(false);
      useEffect(() => {
        let dead = false;
        const check = () => {
          if (navigator.storage && navigator.storage.persisted) {
            navigator.storage.persisted().then(p => {
              if (dead) return;
              setPersisted(p);
              if (!p && navigator.storage.persist) navigator.storage.persist().then(g => { if (!dead) setPersisted(g); }).catch(() => {});
            }).catch(() => { if (!dead) setPersisted(false); });
          } else setPersisted(false); // nem támogatott (pl. iOS Safari) → figyelmeztessünk
        };
        check();
        const onVis = () => { if (document.visibilityState === 'visible') check(); };
        document.addEventListener('visibilitychange', onVis);
        return () => { dead = true; document.removeEventListener('visibilitychange', onVis); };
      }, []);
      const exportBackup = () => {
        try {
          const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob); const a = document.createElement('a');
          a.href = url; a.download = `palanta-mentes-${todayISO()}.json`; a.click();
          setTimeout(() => URL.revokeObjectURL(url), 1000); toast('Mentés letöltve', '💾');
        } catch (e) { toast('Nem sikerült a mentés', '⚠️'); }
      };
      if (persisted !== false || dismissed || (data.plants || []).length === 0) return null;
      return (
        <div style={{ background: 'color-mix(in srgb, var(--soon) 16%, var(--surface))', borderBottom: '1px solid color-mix(in srgb, var(--soon) 40%, transparent)', padding: '11px 16px', flexShrink: 0 }}>
          <div style={{ display: 'flex', gap: 10, alignItems: 'flex-start', maxWidth: 1180, margin: '0 auto' }}>
            <span style={{ fontSize: 18, flexShrink: 0 }}>⚠️</span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, lineHeight: 1.45, fontWeight: 600 }}>Az adataid <b>nincsenek védve</b> a böngésző általi törléstől – ezért tűnhettek el újraindításkor. <b>Telepítsd az appot a kezdőképernyőre</b> (böngészőmenü → „Alkalmazás telepítése" / „Hozzáadás a kezdőképernyőhöz"), és időnként ments!</div>
              <div style={{ display: 'flex', gap: 8, marginTop: 9 }}>
                <button className="btn btn-primary btn-sm" onClick={exportBackup}><Icon name="download" size={14} />Mentés most</button>
                <button className="btn btn-ghost btn-sm" onClick={() => setDismissed(true)}>Elrejt</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Automatikus napi mentés (opcionális): a Letöltésekbe ment egy JSON-t, ami a böngésző-ürítést is túléli
    function AutoBackup() {
      const { data, setSettings } = useStore();
      useEffect(() => {
        const s = data.settings || {};
        if (!s.autoBackup || (data.plants || []).length === 0 || s.lastAutoBackup === todayISO()) return;
        const t = setTimeout(() => {
          try {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob); const a = document.createElement('a');
            a.href = url; a.download = `palanta-auto-${todayISO()}.json`; a.click();
            setTimeout(() => URL.revokeObjectURL(url), 1500);
            setSettings({ lastAutoBackup: todayISO() });
          } catch (e) {}
        }, 3500);
        return () => clearTimeout(t);
      }, []);
      return null;
    }

    /* ============================ APP ============================ */
    const NAV = [
      { key: 'dashboard', label: 'Kezdő', icon: 'home' },
      { key: 'plants', label: 'Növények', icon: 'leaf' },
      { key: 'calendar', label: 'Naptár', icon: 'calendar' },
      { key: 'stats', label: 'Statisztika', icon: 'chart' },
      { key: 'settings', label: 'Beállítások', icon: 'settings' },
    ];

    function App() {
      const [view, setView] = useState('dashboard');
      const [detail, setDetail] = useState(null);
      const [modal, setModal] = useState(null); // {type, ...}
      const [refreshing, setRefreshing] = useState(false);
      const scrollRef = useRef(null);
      const indRef = useRef(null);
      const ptr = useRef({ tracking: false, startY: 0, ready: false });

      // Telefonos VISSZA gomb: ne lépjen ki az appból – előbb csukja be a felugró ablakot / billentyűzetet / részleteket
      const modalRef = useRef(null); modalRef.current = modal;
      const detailRef = useRef(null); detailRef.current = detail;
      const viewRef = useRef('dashboard'); viewRef.current = view;
      useEffect(() => {
        const buffer = () => { try { history.pushState({ palanta: true }, ''); } catch (e) {} };
        buffer();
        const onPop = () => {
          const ae = document.activeElement;
          if (ae && /^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName)) { ae.blur(); buffer(); return; }   // csak a billentyűzetet csukja le
          if (modalRef.current) { setModal(null); buffer(); return; }                                  // felugró ablak bezárása
          if (detailRef.current) { setDetail(null); buffer(); return; }                                 // vissza a listához
          if (viewRef.current !== 'dashboard') { setView('dashboard'); buffer(); return; }              // vissza a kezdőlapra
          // kezdőlapon, semmi nyitva → engedjük kilépni
        };
        window.addEventListener('popstate', onPop);
        return () => window.removeEventListener('popstate', onPop);
      }, []);

      // Pull-to-refresh: a lap tetején lefelé húzva újratölt (és lehúzza a friss verziót)
      useEffect(() => {
        const el = scrollRef.current; const ind = indRef.current;
        if (!el) return;
        const THRESH = 70;
        const setInd = (pull, smooth) => {
          if (!ind) return;
          ind.style.transition = smooth ? 'transform .25s ease, opacity .2s' : 'none';
          ind.style.transform = `translate(-50%, ${pull - 48}px)`;
          ind.style.opacity = pull > 6 ? '1' : '0';
          const ic = ind.querySelector('svg');
          if (ic) { ic.style.transform = `rotate(${Math.min(pull * 2.4, 300)}deg)`; ic.style.color = pull >= THRESH ? 'var(--primary)' : 'var(--text-3)'; }
        };
        const onStart = (e) => { if (el.scrollTop <= 0 && !ptr.current.refreshing) { ptr.current.tracking = true; ptr.current.startY = e.touches[0].clientY; ptr.current.ready = false; } else ptr.current.tracking = false; };
        const onMove = (e) => {
          if (!ptr.current.tracking) return;
          if (el.scrollTop > 0) { ptr.current.tracking = false; setInd(0, true); return; }
          const dy = e.touches[0].clientY - ptr.current.startY;
          if (dy > 0) { const d = Math.min(dy * 0.5, 110); setInd(d, false); ptr.current.ready = d >= THRESH; if (dy > 6 && e.cancelable) e.preventDefault(); }
          else setInd(0, false);
        };
        const onEnd = () => {
          if (!ptr.current.tracking) return;
          ptr.current.tracking = false;
          if (ptr.current.ready) {
            ptr.current.refreshing = true;
            if (ind) { ind.style.transition = 'transform .2s ease'; ind.style.transform = 'translate(-50%, 14px)'; ind.style.opacity = '1'; }
            setRefreshing(true);
            setTimeout(() => window.location.reload(), 260);
          } else setInd(0, true);
        };
        el.addEventListener('touchstart', onStart, { passive: true });
        el.addEventListener('touchmove', onMove, { passive: false });
        el.addEventListener('touchend', onEnd, { passive: true });
        el.addEventListener('touchcancel', onEnd, { passive: true });
        return () => {
          el.removeEventListener('touchstart', onStart);
          el.removeEventListener('touchmove', onMove);
          el.removeEventListener('touchend', onEnd);
          el.removeEventListener('touchcancel', onEnd);
        };
      }, []);

      // Tartós tárolás kérése: a böngésző NE törölhesse magától az adatokat (pl. kevés tárhelynél)
      useEffect(() => {
        if (navigator.storage && navigator.storage.persist) {
          navigator.storage.persisted().then(p => { if (!p) navigator.storage.persist(); }).catch(() => {});
        }
      }, []);

      const openPlant = id => { setDetail(id); setView('plants'); window.scrollTo && window.scrollTo(0, 0); };
      const go = v => { if (v === 'add') { setModal({ type: 'form' }); return; } setDetail(null); setView(v); };

      const closeModal = () => setModal(null);
      const showFab = ['dashboard', 'plants', 'calendar'].includes(view) && !detail;

      let main;
      if (detail) main = <PlantDetail plantId={detail} back={() => setDetail(null)} edit={id => setModal({ type: 'form', plantId: id })} editEvent={id => setModal({ type: 'event', eventId: id })} logFor={id => setModal({ type: 'log', plant: id })} repot={id => setModal({ type: 'repot', plantId: id })} />;
      else if (view === 'dashboard') main = <Dashboard go={go} openPlant={openPlant} quickLog={() => setModal({ type: 'log' })} />;
      else if (view === 'plants') main = <PlantsList openPlant={openPlant} quickLog={() => setModal({ type: 'log' })} />;
      else if (view === 'calendar') main = <CalendarView openPlant={openPlant} openDay={iso => setModal({ type: 'day', iso })} />;
      else if (view === 'stats') main = <StatsView />;
      else if (view === 'settings') main = <SettingsView openKB={() => setModal({ type: 'kb' })} openInv={() => setModal({ type: 'inv' })} />;

      return (
        <div className="app">
          <aside className="sidebar">
            <div className="side-brand brand">
              <div className="brand-mark"><Icon name="leaf" size={21} /></div>
              <div><div className="brand-name">Palánta</div><div className="brand-sub">növénynapló</div></div>
            </div>
            <nav className="side-nav">
              {NAV.map(n => (
                <button key={n.key} className={cls('side-btn', view === n.key && !detail && 'on')} onClick={() => go(n.key)}>
                  <Icon name={n.icon} size={20} />{n.label}
                </button>
              ))}
            </nav>
            <button className="btn btn-primary" onClick={() => setModal({ type: 'fab' })}><Icon name="plus" size={18} />Új</button>
          </aside>

          <div className="content">
            <div className="ptr-ind" ref={indRef}>
              {refreshing ? <div className="ptr-ring" /> : <Icon name="leaf" size={18} />}
            </div>
            <header className="topbar">
              <div className="brand">
                <div className="brand-mark"><Icon name="leaf" size={21} /></div>
                <div><div className="brand-name">Palánta</div><div className="brand-sub">növénynapló</div></div>
              </div>
            </header>
            <DataGuardBanner />
            <AutoBackup />

            <main className="scroll" ref={scrollRef}>
              <div className="page" key={view + (detail || '')}>{main}</div>
            </main>
          </div>

          <nav className="bottomnav">
            {NAV.map(n => (
              <button key={n.key} className={cls('navbtn', view === n.key && !detail && 'on')} onClick={() => go(n.key)}>
                <Icon name={n.icon} size={22} className="ni" sw={view === n.key && !detail ? 2.4 : 2} />
                {n.label}
              </button>
            ))}
          </nav>

          {showFab && <button className="fab" onClick={() => setModal({ type: 'fab' })} aria-label="Hozzáadás"><Icon name="plus" size={26} sw={2.4} /></button>}

          {modal && modal.type === 'fab' && <FabMenu close={closeModal} onAddPlant={() => setModal({ type: 'form' })} onLog={() => setModal({ type: 'log' })} />}
          {modal && modal.type === 'form' && <PlantForm plantId={modal.plantId} close={closeModal} />}
          {modal && modal.type === 'log' && <QuickLog presetPlant={modal.plant} close={closeModal} />}
          {modal && modal.type === 'day' && <DayModal iso={modal.iso} close={closeModal} openPlant={openPlant} addForDay={iso => setModal({ type: 'log' })} />}
          {modal && modal.type === 'event' && <EventEdit eventId={modal.eventId} close={closeModal} />}
          {modal && modal.type === 'kb' && <KnowledgeBase close={closeModal} />}
          {modal && modal.type === 'inv' && <InventoryView close={closeModal} />}
          {modal && modal.type === 'repot' && <RepotSheet plantId={modal.plantId} close={closeModal} />}
        </div>
      );
    }

    try {
      ReactDOM.createRoot(document.getElementById('root')).render(
        <StoreProvider><App /></StoreProvider>
      );
    } catch (e) {
      if (window.showBootError) window.showBootError(e && (e.stack || e.message) || String(e));
    }
  </script>

  <!-- Service worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW hiba', e));
      });
    }
  </script>
</body>
</html>
